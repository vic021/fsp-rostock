<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSP Medizin – Operationen & Untersuchungen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════ TOKENS ═══════════ */
:root{
  --bg:#F0F4F8; --sb:#0B1F3A; --sb-h:#142E55; --sb-a:#1A3D6E;
  --acc:#1565C0; --acc2:#0288D1; --alight:#E3F0FF;
  --w:#FFF; --txt:#1C2B3A; --mut:#5A6A7A; --bdr:#D0DCE8;
  --radius:10px; --sh:0 2px 12px rgba(0,0,0,.08);
  --sh2:0 8px 32px rgba(0,0,0,.14); --sbw:272px; --tr:.18s ease;
  /* flowchart */
  --fc-bg:#071523; --fc-card:#0D2240; --fc-bdr:#1E4A7A;
  --fc-line:#00B4D8; --fc-inst:#43A047; --fc-inst-bg:#071C0A;
  --fc-dec:#F9A825; --fc-dec-bg:#2A1A00;
  --fc-no:#2E7D32; --fc-no-bg:#071C0A;
  --fc-yes:#E53935; --fc-yes-bg:#1A0505;
  --fc-compl:#FF7043; --fc-start:#7B1FA2;
  --fc-prep-a:#1565C0; --fc-prep-b:#0277BD;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);display:flex;min-height:100vh;font-size:14px;line-height:1.6}

/* ═══════════ SIDEBAR ═══════════ */
.sb{width:var(--sbw);background:var(--sb);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100}
.sb-logo{padding:22px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo h1{font-size:15px;font-weight:700;color:#fff;letter-spacing:.4px}
.sb-logo p{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.sb-search{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-search input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:7px 11px;font-size:12px;color:#fff;font-family:'Inter',sans-serif;outline:none;transition:var(--tr)}
.sb-search input::placeholder{color:rgba(255,255,255,.3)}
.sb-search input:focus{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.28)}
.sb-lbl{font-size:9.5px;font-weight:600;color:rgba(255,255,255,.28);letter-spacing:1.2px;text-transform:uppercase;padding:10px 18px 4px}
.nav{flex:1;overflow-y:auto;padding:4px 10px 20px}
.nav::-webkit-scrollbar{width:3px}
.nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:7px;cursor:pointer;transition:var(--tr);color:rgba(255,255,255,.6);font-size:12.5px;margin-bottom:1px}
.ni:hover{background:var(--sb-h);color:#fff}
.ni.on{background:var(--sb-a);color:#fff}
.ni .num{font-size:9.5px;font-weight:700;color:#4FC3F7;min-width:16px}
.ni .nm .de{font-size:10.5px;color:rgba(255,255,255,.35)}
.ni.hidden{display:none}

/* ═══════════ MAIN ═══════════ */
.main{margin-left:var(--sbw);flex:1;display:flex;flex-direction:column}
.topbar{background:var(--w);border-bottom:1px solid var(--bdr);padding:13px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tb-title{font-size:15px;font-weight:600;color:var(--acc)}
.tb-sub{font-size:11.5px;color:var(--mut);margin-top:1px}
.btn-print{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--alight);color:var(--acc);border:1px solid #90B8E8;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:var(--tr);font-family:'Inter',sans-serif}
.btn-print:hover{background:var(--acc);color:#fff}
.content{padding:24px 28px 60px;max-width:940px;width:100%}

/* ═══════════ TABS ═══════════ */
.tabbar{display:flex;gap:3px;background:var(--w);padding:4px;border-radius:10px;border:1px solid var(--bdr);margin-bottom:22px;box-shadow:var(--sh);width:fit-content}
.tbbtn{padding:7px 17px;border-radius:7px;font-size:12.5px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--mut);transition:var(--tr);font-family:'Inter',sans-serif}
.tbbtn:hover{color:var(--acc)}
.tbbtn.on{background:var(--acc);color:#fff;box-shadow:0 2px 8px rgba(21,101,192,.28)}
.tabp{display:none}
.tabp.on{display:block}

/* ═══════════ CARDS ═══════════ */
.card{background:var(--w);border-radius:var(--radius);border:1px solid var(--bdr);padding:20px 24px;margin-bottom:16px;box-shadow:var(--sh)}
.ctitle{font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--acc);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ctitle::after{content:'';flex:1;height:1px;background:var(--bdr)}
.def-txt{font-size:13.5px;line-height:1.75}
.goal{display:inline-block;background:var(--alight);color:var(--acc);border-left:3px solid var(--acc);padding:8px 13px;border-radius:0 6px 6px 0;margin-top:10px;font-size:13px;line-height:1.6}
.ind-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.ind-list li{display:flex;align-items:flex-start;gap:9px;font-size:13px;line-height:1.6;padding:5px 9px;border-radius:6px;transition:var(--tr)}
.ind-list li:hover{background:var(--alight)}
.ind-list li::before{content:'▸';color:var(--acc);font-size:11px;margin-top:3px;flex-shrink:0}

/* ═══════════ STEPS ═══════════ */
.step-item{display:flex;gap:14px;position:relative}
.step-item:not(:last-child){padding-bottom:4px}
.step-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.step-num{width:30px;height:30px;border-radius:50%;background:var(--acc);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(21,101,192,.3)}
.step-line{width:2px;flex:1;background:var(--bdr);margin-top:4px;min-height:22px}
.step-item:last-child .step-line{display:none}
.step-body{flex:1;padding:5px 0 18px}
.step-action{font-size:13.5px;line-height:1.65;margin-bottom:6px}
.step-inst{display:inline-flex;align-items:center;gap:6px;background:#E8F5E9;border:1px solid #A5D6A7;border-radius:20px;padding:3px 11px;font-size:11.5px;color:#2E7D32;font-weight:500}
.step-inst::before{content:'🔧';font-size:11px}

/* ═══════════ TABLE ═══════════ */
.dtbl{width:100%;border-collapse:collapse;font-size:13px}
.dtbl th{background:var(--acc);color:#fff;padding:9px 13px;text-align:left;font-weight:600;font-size:11.5px}
.dtbl th:first-child{border-radius:7px 0 0 0}
.dtbl th:last-child{border-radius:0 7px 0 0}
.dtbl td{padding:8px 13px;border-bottom:1px solid var(--bdr);line-height:1.5;vertical-align:top}
.dtbl tr:nth-child(even) td{background:#F5F8FC}
.dtbl tr:hover td{background:var(--alight)}
.dtbl .fach{font-weight:600;color:var(--acc)}
.dtbl .umg{color:var(--mut);font-style:italic}
.dtbl .instr-icon{width:34px;padding:6px 4px 6px 10px !important}
.dtbl .instr-icon svg{width:22px;height:22px;color:var(--acc);display:block}
.dtbl th:first-child{border-radius:7px 0 0 0;width:34px}

/* ═══════════ FLOWCHART ═══════════ */
.fc-wrap{background:var(--fc-bg);border-radius:14px;padding:32px 24px 40px;overflow-x:auto}
.fc{display:flex;flex-direction:column;align-items:center;gap:0;min-width:580px}

/* terminal (start/end) */
.fc-terminal{padding:9px 36px;border-radius:99px;font-weight:700;font-size:13px;letter-spacing:.4px;color:#fff}
.fc-start{background:linear-gradient(135deg,#7B1FA2,#4527A0);box-shadow:0 0 20px rgba(123,31,162,.4)}
.fc-end  {background:linear-gradient(135deg,#AD1457,#6A1B9A);box-shadow:0 0 20px rgba(173,20,87,.4)}

/* connector arrow */
.fc-arr{display:flex;flex-direction:column;align-items:center;gap:0}
.fc-arr-line{width:2px;height:22px;background:linear-gradient(to bottom,#00B4D8,#0288D1)}
.fc-arr-head{width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid #0288D1}

/* prep */
.fc-prep{width:560px;background:linear-gradient(135deg,var(--fc-prep-a),var(--fc-prep-b));border-radius:12px;padding:14px 18px;box-shadow:0 4px 16px rgba(21,101,192,.3)}
.fc-prep-title{font-size:12px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.fc-prep-tags{display:flex;flex-wrap:wrap;gap:6px}
.fc-prep-tag{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:3px 11px;font-size:11.5px;color:#fff;font-weight:500}

/* step card */
.fc-step{width:560px;background:var(--fc-card);border:1px solid var(--fc-bdr);border-left:3px solid var(--fc-line);border-radius:10px;padding:12px 16px;display:flex;gap:12px;align-items:flex-start;box-shadow:0 2px 10px rgba(0,0,0,.2)}
.fc-snum{width:26px;height:26px;border-radius:50%;background:var(--fc-line);color:#071523;font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.fc-sbody{flex:1}
.fc-stext{font-size:12.5px;line-height:1.65;color:#B8D4F0;margin-bottom:7px}
.fc-sinst{display:inline-flex;align-items:center;gap:5px;background:var(--fc-inst-bg);border:1px solid rgba(67,160,71,.4);border-radius:20px;padding:3px 11px;font-size:11px;color:#81C784;font-weight:500}
.fc-sinst::before{content:'🔧';font-size:10px}

/* decision block */
.fc-dec-wrap{width:560px;display:flex;flex-direction:column;align-items:center}
.fc-diamond-outer{position:relative;width:180px;height:90px;display:flex;align-items:center;justify-content:center}
.fc-diamond-bg{position:absolute;inset:0;background:var(--fc-dec-bg);border:2px solid var(--fc-dec);transform:rotate(45deg);border-radius:6px;box-shadow:0 0 18px rgba(249,168,37,.3)}
.fc-diamond-txt{position:relative;z-index:1;color:var(--fc-dec);font-weight:700;font-size:12px;text-align:center;line-height:1.4;padding:4px}

/* fork */
.fc-fork{display:flex;gap:14px;margin-top:16px;width:100%}
.fc-fork-no{flex:1;background:var(--fc-no-bg);border:1.5px solid rgba(46,125,50,.5);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:6px}
.fc-fork-yes{flex:1.6;background:var(--fc-yes-bg);border:1.5px solid rgba(229,57,53,.4);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:6px}
.fc-fork-lbl{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 10px;border-radius:20px;width:fit-content}
.fc-fork-lbl.lno{background:rgba(46,125,50,.2);color:#81C784}
.fc-fork-lbl.lyes{background:rgba(229,57,53,.2);color:#EF9A9A}
.fc-fork-txt{font-size:12px;color:#90A4AE;line-height:1.5}
.fc-compl-item{background:rgba(255,112,67,.08);border-left:2px solid var(--fc-compl);border-radius:0 6px 6px 0;padding:5px 10px;font-size:11.5px;color:#FFAB91;line-height:1.5}
.fc-compl-item strong{color:#FF7043}

/* check node (simple decision inline) */
.fc-check{width:560px;background:#0A1E35;border:1.5px dashed rgba(0,180,216,.3);border-radius:10px;padding:11px 16px;display:flex;gap:10px;align-items:flex-start}
.fc-check-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.fc-check-body{flex:1}
.fc-check-q{font-size:12px;font-weight:600;color:#4FC3F7;margin-bottom:6px}
.fc-check-branches{display:flex;flex-direction:column;gap:4px}
.fc-cb{font-size:11.5px;line-height:1.5}
.fc-cb .cb-no{color:#81C784;font-weight:600}
.fc-cb .cb-yes{color:#EF9A9A;font-weight:600}

/* info node */
.fc-info{width:560px;background:#0A1628;border:1px solid rgba(0,180,216,.2);border-radius:10px;padding:10px 16px}
.fc-info-txt{font-size:12px;color:#7B97B0;line-height:1.6}
.fc-info-txt strong{color:#4FC3F7}

/* welcome */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:68vh;text-align:center;color:var(--mut)}
.welcome .big{font-size:56px;margin-bottom:18px;opacity:.7}
.welcome h2{font-size:20px;font-weight:600;color:var(--acc);margin-bottom:8px}
.welcome p{font-size:13.5px;max-width:400px;line-height:1.7}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-top:28px;width:100%;max-width:680px}
.pcard{background:var(--w);border:1px solid var(--bdr);border-radius:10px;padding:14px 16px;cursor:pointer;transition:var(--tr);text-align:left;box-shadow:var(--sh)}
.pcard:hover{border-color:var(--acc);box-shadow:var(--sh2);transform:translateY(-2px)}
.pcard .pc-n{font-size:10.5px;font-weight:700;color:var(--acc)}
.pcard .pc-t{font-size:13px;font-weight:600;color:var(--txt);margin-top:4px;line-height:1.3}
.pcard .pc-s{font-size:11px;color:var(--mut);margin-top:2px}

@media print{
  .sb,.topbar,.tabbar{display:none!important}
  .main{margin-left:0}
  .content{max-width:100%;padding:0}
  .tabp{display:block!important}
  .card,.fc-wrap{break-inside:avoid;page-break-inside:avoid}
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#C0CDD8;border-radius:3px}
</style>

<script>
// ══════════════════════════════════════════════════════════════════════
//  FLOW BUILDER — helper to build structured flow arrays
// ══════════════════════════════════════════════════════════════════════
const S = () => ({t:'start'});
const E = () => ({t:'end'});
const P = (items) => ({t:'prep', items});
const A = (text, inst) => ({t:'step', text, inst});
const D = (q, no, yesItems) => ({t:'decision', q, no, yes: yesItems});
const C = (q, branches) => ({t:'check', q, branches}); // inline compact decision

// ══════════════════════════════════════════════════════════════════════
//  PROCEDURE DATA
// ══════════════════════════════════════════════════════════════════════
const procedures = [
{
  id:'u', title:'Urethrozystoskopie', sub:'Blasenspiegelung', icon:'🔭',
  def:`Die <strong>Urethrozystoskopie (Blasenspiegelung)</strong> ist eine endoskopische (durch ein optisches Gerät durchgeführte) Untersuchung der <strong>Urethra (Harnröhre)</strong> und der <strong>Vesica urinaria (Harnblase)</strong> mittels eines optischen Instruments.`,
  goal:`Direkte Visualisierung (Sichtbarmachung) der Urothelmukosa (Schleimhaut der Harnwege) zur Diagnostik und ggf. therapeutischen Intervention (Behandlung).`,
  ind:[
    'Hämaturie (Blut im Urin) — makroskopisch oder mikroskopisch',
    'Verdacht auf Urothelkarzinom (Blasentumor)',
    'Rezidivierende Harnwegsinfektionen (wiederkehrende Blasenentzündungen)',
    'Urolithiasis (Harnsteine) der Blase',
    'Miktionsbeschwerden (Probleme beim Wasserlassen) unklarer Genese',
    'Verlaufskontrollen nach Tumorresektion (Tumornachsorge)',
    'Striktur (Verengung) der Urethra'
  ],
  steps:[
    {n:1,a:'Instillation (Einbringen) von Instillagel in die Urethra zur Lokalanästhesie (örtlichen Betäubung) und Gleitfähigkeit.',i:'Instillagel-Spritze'},
    {n:2,a:'Das Zystoskop (Blasenspiegel) wird unter Sichtkontrolle transurethral (durch die Harnröhre) eingeführt.',i:'Starres / flexibles Zystoskop'},
    {n:3,a:'Füllung der Vesica urinaria (Harnblase) mit steriler Spüllösung (Kochsalzlösung) über den Spülkanal zur Übersichtsverbesserung.',i:'Spülkanal des Zystoskops'},
    {n:4,a:'Inspektion der Urethralschleimhaut (Harnröhrenschleimhaut) auf Strikturen (Verengungen), Läsionen (Verletzungen), Tumoren (Geschwüre).',i:'Optik des Zystoskops'},
    {n:5,a:'Systematische Inspektion der Blasenschleimhaut: Trigonum vesicae (Blasendreieck), Ostia ureterica (Harnleitermündungen), Blasendach.',i:'30°- und 70°-Optik'},
    {n:6,a:'Bei suspekten (verdächtigen) Läsionen: Biopsie (Gewebeentnahme) oder transurethrale Resektion (Tumorentfernung).',i:'Biopsiezange, Resektionsschlinge (Schneideinstrument)'}
  ],

    D('Gefäßverletzung?',
      'NEIN → Hämostasekontrolle (Blutstillungsprüfung) + Lymphleckkontrolle → Redon-Drainage (Saugdrainageröhrchen) → Schichtweiser Wundverschluss',
      [
        '<strong>V. jugularis interna (innere Halsvene)</strong> → Sofortige Kompression → Gefäßnaht (Venennaht)',
        '<strong>A. carotis communis (gemeinsame Halsschlagader)</strong> → Kompression → Gefäßchirurgie (Gefäßoperation) → notfallmäßige Rekonstruktion (Wiederherstellung)'
      ]
    ),
    D('Postoperative Komplikation?',
      'NEIN → Drainage beobachten, Histologiebefund (Gewebsbefund) abwarten',
      [
        '<strong>⚠ Hämatom (Blutansammlung) mit Atemwegskompression</strong> → sofortige operative Ausräumung + Reintubation (erneute Beatmungsschlaucheinführung)!',
        '<strong>Chylusfistel (Milchsaftfistel, linksseitig)</strong> → Drainage + Druckverband + fettarme Ernährung → ggf. operative Revision',
        '<strong>Pneumothorax (Luftansammlung im Brustkorb)</strong> → Thoraxröntgen → Thoraxdrainage (Brustdrainageröhrchen)'
      ]
    ),
    E()
  ]
}
];

// ══════════════════════════════════════════════════════════════════════
//  FLOW RENDERER
// ══════════════════════════════════════════════════════════════════════
function renderFlow(flow){
  let h='<div class="fc">';
  for(const n of flow){
    if(n.t==='start'){
      h+=`<div class="fc-terminal fc-start">▶ START</div>`;
      h+=arr();
    } else if(n.t==='end'){
      h+=arr();
      h+=`<div class="fc-terminal fc-end">■ ENDE</div>`;
    } else if(n.t==='prep'){
      h+=`<div class="fc-prep">
        <div class="fc-prep-title">🏥 Präoperative Vorbereitung</div>
        <div class="fc-prep-tags">${n.items.map(i=>`<span class="fc-prep-tag">${i}</span>`).join('')}</div>
      </div>`;
      h+=arr();
    } else if(n.t==='step'){
      h+=`<div class="fc-step">
        <div class="fc-snum">${n.n||'→'}</div>
        <div class="fc-sbody">
          <div class="fc-stext">${n.text||n.a}</div>
          <div class="fc-sinst">${n.inst||n.i}</div>
        </div>
      </div>`;
      h+=arr();
    } else if(n.t==='decision'){
      h+=`<div class="fc-dec-wrap">
        <div class="fc-diamond-outer">
          <div class="fc-diamond-bg"></div>
          <div class="fc-diamond-txt">${n.q}</div>
        </div>
        <div class="fc-fork">
          <div class="fc-fork-no">
            <div class="fc-fork-lbl lno">✓ NEIN</div>
            <div class="fc-fork-txt">${n.no}</div>
          </div>
          <div class="fc-fork-yes">
            <div class="fc-fork-lbl lyes">⚠ JA</div>
            ${(n.yes||[]).map(y=>`<div class="fc-compl-item">${y}</div>`).join('')}
          </div>
        </div>
      </div>`;
      h+=arr();
    } else if(n.t==='check'){
      h+=`<div class="fc-check">
        <div class="fc-check-icon">🔀</div>
        <div class="fc-check-body">
          <div class="fc-check-q">${n.q}</div>
          <div class="fc-check-branches">
            ${(n.branches||[]).map(b=>`
              <div class="fc-cb">
                <span class="fc-fork-lbl ${b.cls}" style="display:inline-block;margin-bottom:2px">${b.lbl}</span>
                <span style="color:#90A4AE;font-size:11.5px;margin-left:6px">${b.txt}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>`;
      h+=arr();
    }
  }
  h+='</div>';
  return h;
}

function arr(){
  return `<div class="fc-arr"><div class="fc-arr-line"></div><div class="fc-arr-head"></div></div>`;
}

function getInstrIcon(name){
  const n = name.toLowerCase();
  for (const [kw, type] of ICON_KEYWORD_MAP) {
    if (n.includes(kw)) return INSTR_ICONS[type];
  }
  return INSTR_ICONS.generic;
}

function buildNav(){
  document.getElementById('navList').innerHTML = procedures.map((p,i)=>`
    <div class="ni" id="ni-${p.id}" onclick="show('${p.id}')">
      <span class="num">${String(i+1).padStart(2,'0')}</span>
      <div class="nm"><div>${p.title}</div><div class="de">${p.sub}</div></div>
    </div>`).join('');
}

function filterNav(q){
  const ql=q.toLowerCase();
  procedures.forEach(p=>{
    const el=document.getElementById('ni-'+p.id);
    el.classList.toggle('hidden', !p.title.toLowerCase().includes(ql)&&!p.sub.toLowerCase().includes(ql));
  });
}

function show(id){
  document.querySelectorAll('.ni').forEach(e=>e.classList.remove('on'));
  document.getElementById('ni-'+id).classList.add('on');
  const p=procedures.find(x=>x.id===id);
  document.getElementById('tbTitle').textContent=`${p.title} — ${p.sub}`;
  document.getElementById('tbSub').textContent='FSP Fachsprachprüfung · Medizinisches Referenzdokument';

  const stepsHtml=p.steps.map(s=>`
    <div class="step-item">
      <div class="step-left"><div class="step-num">${s.n}</div><div class="step-line"></div></div>
      <div class="step-body">
        <div class="step-action">${s.a}</div>
        <div class="step-inst">${s.i}</div>
      </div>
    </div>`).join('');

  const tblHtml=`<table class="dtbl">
    <thead><tr><th></th><th>Fachbegriff</th><th>Umgangssprache</th><th>Funktion</th></tr></thead>
    <tbody>${p.instr.map((r,i)=>`<tr><td class="instr-icon">${getInstrIcon(r[0])}</td><td class="fach">${esc(r[0])}</td><td class="umg">${esc(r[1])}</td><td>${esc(r[2])}</td></tr>`).join('')}</tbody>
  </table>`;



  document.getElementById('mainContent').innerHTML=`
    <div class="tabbar" id="tb">
      <button class="tbbtn on" onclick="swTab('def',this)">📋 Definition</button>
      <button class="tbbtn"    onclick="swTab('abl',this)">🔢 Ablauf</button>
      <button class="tbbtn"    onclick="swTab('ins',this)">🔧 Instrumente</button>
      <button class="tbbtn"    onclick="swTab('fc',this)">📊 Organigramm</button>
    </div>

    <div class="tabp on" id="tab-def">
      <div class="card"><div class="ctitle">Definition</div>
        <div class="def-txt">${p.def}<div class="goal"><strong>Ziel:</strong> ${p.goal}</div></div>
      </div>
      <div class="card"><div class="ctitle">Indikationen</div>
        <ul class="ind-list">${p.ind.map(i=>`<li>${i}</li>`).join('')}</ul>
      </div>
    </div>

    <div class="tabp" id="tab-abl">
      <div class="card"><div class="ctitle">Ablauf — chronologisch</div>
        <div>${stepsHtml}</div>
      </div>
    </div>

    <div class="tabp" id="tab-ins">
      <div class="card"><div class="ctitle">Instrumente</div>${tblHtml}</div>
    </div>

    <div class="tabp" id="tab-fc">
      <div class="card" style="padding:16px">
        <div class="ctitle">Organigramm — Ablauf + Instrumente + Reaktion auf Komplikationen</div>
        <div class="fc-wrap">${renderFlow(p.flow)}</div>
      </div>
    </div>`;
}

function swTab(id,btn){
  document.querySelectorAll('.tabp').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tbbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+id).classList.add('on');
  btn.classList.add('on');
}

function showWelcome(){
  document.getElementById('mainContent').innerHTML=`
    <div class="welcome">
      <div class="big">🏥</div>
      <h2>FSP Fachsprachprüfung · Medizin</h2>
      <p>Wählen Sie einen Eingriff aus der Navigation — oder klicken Sie direkt unten.</p>
      <div class="pgrid">${procedures.map((p,i)=>`
        <div class="pcard" onclick="show('${p.id}')">
          <div class="pc-n">${p.icon} ${String(i+1).padStart(2,'0')}</div>
          <div class="pc-t">${p.title}</div>
          <div class="pc-s">${p.sub}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

buildNav();
showWelcome();

// Mobiles Sidebar-Menü (Hamburger-Toggle)
(function(){
  const menuToggle = document.getElementById('menuToggle');
  const sidebar = document.querySelector('.sb');
  const overlay = document.getElementById('sbOverlay');
  function closeSidebar(){ sidebar.classList.remove('open'); overlay.classList.remove('active'); }
  function openSidebar(){ sidebar.classList.add('open'); overlay.classList.add('active'); }
  if (menuToggle) {
    menuToggle.addEventListener('click', () => {
      sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
    });
  }
  if (overlay) overlay.addEventListener('click', closeSidebar);
  const navList = document.getElementById('navList');
  if (navList) {
    navList.addEventListener('click', (e) => {
      if (window.innerWidth <= 860 && e.target.closest('.ni')) {
        closeSidebar();
      }
    });
  }
})();
</script>
