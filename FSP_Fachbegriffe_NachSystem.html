<title>FSP Fachbegriffe – Nach System</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  min-height: 100vh;
  color: white;
  padding: 20px;
}
h1 {
  text-align: center;
  font-size: 1.15rem;
  font-weight: 700;
  margin-bottom: 4px;
  letter-spacing: 0.5px;
}
.subtitle {
  text-align:center;
  font-size:0.75rem;
  opacity:0.5;
  margin-bottom: 18px;
}

/* FILTER TABS */
.filter-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  justify-content: center;
  max-width: 780px;
  margin: 0 auto 20px;
}
.filter-btn {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.7);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.72rem;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.filter-btn:hover, .filter-btn.active {
  background: rgba(255,255,255,0.18);
  color: white;
  border-color: rgba(255,255,255,0.35);
}
.filter-btn.active {
  font-weight: 700;
}

/* CARD */
.card-wrap {
  perspective: 1200px;
  width: 100%;
  max-width: 560px;
  height: 260px;
  margin: 0 auto 18px;
  cursor: pointer;
}
.card {
  width:100%; height:100%;
  position:relative;
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
}
.card.flipped { transform: rotateY(180deg); }
.face {
  position:absolute; width:100%; height:100%;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 18px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding: 28px;
  text-align:center;
  box-shadow: 0 16px 50px rgba(0,0,0,0.5);
}
.front {
  background: linear-gradient(145deg, #1b2142, #2a3870);
  border: 1px solid rgba(255,255,255,0.1);
}
.back {
  background: linear-gradient(145deg, #fff, #eef2ff);
  color: #1a1a2e;
  transform: rotateY(180deg);
}
.card-system {
  font-size: 0.68rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  opacity: 0.45;
  margin-bottom: 12px;
}
.back .card-system { color: #555; }
.card-word {
  font-size: 1.65rem;
  font-weight: 800;
  line-height: 1.25;
}
.back .card-word { color: #1a1a2e; font-size: 1.4rem; }
.flip-hint {
  font-size: 0.68rem;
  opacity: 0.3;
  margin-top: 16px;
}

/* CONTROLS */
.nav-row {
  display:flex; align-items:center; justify-content:center; gap:14px;
  margin-bottom: 14px;
}
.nav-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color:white;
  width:46px; height:46px;
  border-radius:50%;
  font-size:1.2rem;
  cursor:pointer;
  transition:all 0.2s;
  display:flex; align-items:center; justify-content:center;
}
.nav-btn:hover { background:rgba(255,255,255,0.2); }
.progress-text { font-size:0.85rem; opacity:0.7; font-weight:600; min-width:90px; text-align:center; }

/* PROGRESS BAR */
.pbar-wrap {
  width:100%; max-width:560px;
  height:3px;
  background:rgba(255,255,255,0.08);
  border-radius:4px;
  margin: 0 auto 18px;
}
.pbar {
  height:100%;
  background: linear-gradient(90deg, #a78bfa, #60a5fa);
  border-radius:4px;
  transition:width 0.3s;
}

/* SCORE & ACTIONS */
.action-row {
  display:flex; flex-wrap:wrap; gap:9px; justify-content:center; margin-bottom:10px;
}
.act-btn {
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.72);
  padding:7px 16px;
  border-radius:18px;
  font-size:0.75rem;
  cursor:pointer;
  transition:all 0.2s;
}
.act-btn:hover { background:rgba(255,255,255,0.15); color:white; }
.score-bar {
  text-align:center;
  font-size:0.75rem;
  opacity:0.5;
  margin-bottom:8px;
}
.score-bar span { color:#a78bfa; font-weight:700; font-size:0.9rem; }
.kbd { font-size:0.65rem; opacity:0.3; text-align:center; margin-top:8px; }
</style>

<p class="subtitle" id="deckInfo">Alle Systeme · 426 Karten</p>

<div class="filter-wrap" id="filterWrap"></div>

<div class="pbar-wrap"><div class="pbar" id="pbar" style="width:0%"></div></div>

<div class="card-wrap" onclick="flip()">
  <div class="card" id="card">
    <div class="face front">
      <div class="card-system" id="csystem"></div>

    </div>
  </div>
</div>

<div class="nav-row">
  <button class="nav-btn" onclick="prev()">&#8592;</button>
  <div class="progress-text" id="ptext">–</div>
  <button class="nav-btn" onclick="next()">&#8594;</button>
</div>

<div class="score-bar">Richtig: <span id="score">0</span></div>

<div class="action-row">
  <button class="act-btn" onclick="markOk()">✓ Richtig</button>
  <button class="act-btn" onclick="markFail()">✗ Falsch</button>
  <button class="act-btn" onclick="shuffleDeck()">⇄ Mischen</button>
  <button class="act-btn" onclick="resetDeck()">↺ Neustart</button>
  <button class="act-btn" onclick="dlCSV()">⬇ CSV</button>
</div>

let deck = [...ALL];
let idx = 0, score = 0, isFlipped = false;
let activeSystem = null;

function buildFilters() {
  const wrap = document.getElementById('filterWrap');
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = '🔀 Alle Systeme';
  allBtn.onclick = () => setSystem(null, allBtn);
  wrap.appendChild(allBtn);

  SYSTEMS.forEach(sys => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = sys;
    btn.onclick = () => setSystem(sys, btn);
    wrap.appendChild(btn);
  });
}

function setSystem(sys, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeSystem = sys;
  deck = sys ? ALL.filter(c => c.system === sys) : [...ALL];
  shuffle(deck);
  idx = 0; score = 0;
  document.getElementById('score').textContent = 0;
  const total = deck.length;
  document.getElementById('deckInfo').textContent = (sys || 'Alle Systeme') + ' · ' + total + ' Karten';
  show();
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];
  }
}

function show() {
  const c = deck[idx];
  document.getElementById('card').classList.remove('flipped');
  isFlipped = false;
  setTimeout(() => {
    document.getElementById('csystem').textContent = c.system;
    document.getElementById('csystem2').textContent = c.system;
    document.getElementById('cword').textContent = c.question;
    document.getElementById('canswer').textContent = c.answer;
  }, 0);
  const pct = deck.length ? ((idx+1)/deck.length*100).toFixed(0) : 0;
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('ptext').textContent = (idx+1) + ' / ' + deck.length;
}

function flip() {
  document.getElementById('card').classList.toggle('flipped');
  isFlipped = !isFlipped;
}
function next() { if (idx < deck.length-1) { idx++; show(); } }
function prev() { if (idx > 0) { idx--; show(); } }
function markOk() { score++; document.getElementById('score').textContent = score; next(); }
function markFail() { next(); }
function shuffleDeck() { shuffle(deck); idx=0; show(); }
function resetDeck() {
  deck = activeSystem ? ALL.filter(c=>c.system===activeSystem) : [...ALL];
  shuffle(deck); idx=0; score=0;
  document.getElementById('score').textContent=0;
  show();
}
function dlCSV() {
  const rows = [['System','Frage','Antwort']].concat(deck.map(c=>['"'+c.system+'"','"'+c.question+'"','"'+c.answer+'"']));
  const csv = rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='FSP_Fachbegriffe_NachSystem.csv'; a.click();
}

document.addEventListener('keydown', e => {
  if (e.code==='Space') { e.preventDefault(); flip(); }
  if (e.code==='ArrowRight') next();
  if (e.code==='ArrowLeft') prev();
  if (e.key==='r'||e.key==='R') markOk();
  if (e.key==='f'||e.key==='F') markFail();
});

buildFilters();
shuffle(deck);
show();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    });
  }
</script>
