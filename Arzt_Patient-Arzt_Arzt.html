<div class="app">
  <header class="top">
    <h1>FSP Lernkarten</h1>
    <p>Arzt-Arzt · Patient-Arzt · Tableau clinique · Differentialdiagnosen</p>
  </header>

  <div class="controls">
    <div class="control-row">
      <div class="control-label">Thema</div>
      <select id="themeSelect"></select>
    </div>
    <div class="control-row">
      <div class="control-label">Gesprächsart</div>
      <div class="seg" id="sectionSeg"></div>
    </div>
  </div>

  <div class="stats">
    <span id="typeBadgeWrap"></span>
    <span id="deckInfo"></span>
  </div>

  <div id="cardArea">
    <div class="card-wrap">
      <div class="card" id="card">
        <div class="face front">
          <div class="theme-tag" id="frontTag"></div>
          <div class="qtext" id="frontQ"></div>
          <div class="hint">Klicken oder Leertaste zum Umdrehen</div>
        </div>
        <div class="face back">
          <div class="theme-tag" id="backTag"></div>
          <div class="qtext-small" id="backQ"></div>
          <div class="atext" id="backA"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="nav-row">
    <button class="nav-btn" id="prevBtn">&#8592;</button>
    <div class="progress-text" id="progressText">1 / 1</div>
    <button class="nav-btn" id="nextBtn">&#8594;</button>
  </div>

  <div class="bottom-controls">
    <button class="pill-btn" id="shuffleBtn">&#128256; Mischen</button>
    <button class="pill-btn" id="resetBtn">&#8635; Neu starten</button>
    <button class="pill-btn" id="csvBtn">&#8595; CSV Export</button>
  </div>

  <div class="kbd-hint">Leertaste = umdrehen · &larr; / &rarr; = navigieren</div>
</div>

<script>
const ALL_CARDS = [{"theme": "1. Hämaturie", "section": "AP", "type": "qa", "q": "Gibt es keine Alternative zur Blasenspiegelung?", "a": "Es gibt Alternativen wie Ultraschall oder MRT, aber die zeigen die Blase nur von außen. Bei der Spiegelung sehen wir direkt hinein, können Proben nehmen und kleine Veränderungen sofort behandeln – ganz ohne Strahlenbelastung."}, {"theme": "1. Hämaturie", "section": "AP", "type": "qa", "q": "Was ist diese Blaulichtmethode / Fluoreszenzzystoskopie?", "a": "Dabei geben wir einen Farbstoff in die Blase. Bösartige Zellen leuchten dann unter blauem Licht auf. Wir nutzen das nur bei dringendem Verdacht – für heute reicht die normale Spiegelung völlig aus."}, {"theme": "1. Hämaturie", "section": "AP", "type": "qa", "q": "Ein Gerät in die Harnröhre? Das klingt schrecklich! Kann man das nicht in Vollnarkose machen?", "a": "Ich verstehe Ihre Angst vollkommen. Ein betäubendes Gleitgel macht die Harnröhre unempfindlich – Sie spüren höchstens einen leichten Druck. Eine Vollnarkose dauert viel länger, belastet den Kreislauf und bringt mehr Risiken mit sich als dieser kurze, fünfminütige Eingriff."}, {"theme": "1. Hämaturie", "section": "AP", "type": "qa", "q": "Und wenn Sie eine Gewebeprobe entnehmen – tut das weh?", "a": "Ich kann Sie beruhigen: Die Blasenschleimhaut hat fast keine Schmerznerven. Sie spüren höchstens ein kurzes Ziehen, aber es tut nicht weh."}, {"theme": "1. Hämaturie", "section": "AP", "type": "qa", "q": "Was machen Sie, wenn Sie da drinnen etwas verletzen?", "a": "Sollte es zu einer kleinen Verletzung kommen, können wir diese meist direkt während des Eingriffs versorgen. Größere Komplikationen sind die absolute Ausnahme, und unser Team ist für jeden Notfall sofort bereit."}, {"theme": "1. Hämaturie", "section": "AP", "type": "qa", "q": "Wie häufig kommt es zu ernsthaften Komplikationen?", "a": "Die genaue Zahl habe ich gerade nicht im Kopf, aber ich schaue das gerne für Sie nach. Was ich Ihnen sagen kann: Komplikationen sind bei diesem Routineeingriff wirklich sehr selten."}, {"theme": "1. Hämaturie", "section": "AP", "type": "qa", "q": "Sie machen mich mit diesen Risiken nur noch ängstlicher!", "a": "Das tut mir leid, das ist absolut nicht meine Absicht. Ich bin gesetzlich verpflichtet, Sie über alle Möglichkeiten aufzuklären – Sie sind hier in sicheren Händen."}, {"theme": "1. Hämaturie", "section": "AP", "type": "qa", "q": "Was passiert, wenn Sie direkt Krebs finden? Behandeln Sie das sofort?", "a": "Wenn wir auffälliges Gewebe sehen, nehmen wir eine Probe und schicken sie ins Labor. Während der Spiegelung selbst können wir keinen Krebs behandeln – wir können nur Blutungen stillen oder Steine entfernen. Eine sichere Diagnose bekommen wir erst, wenn der Laborbericht da ist."}, {"theme": "1. Hämaturie", "section": "AP", "type": "qa", "q": "Darf ich direkt danach nach Hause und alles normal machen?", "a": "Sie bleiben noch etwa zwei Stunden zur Überwachung bei uns. Da Sie ein Beruhigungsmittel bekommen, dürfen Sie 24 Stunden lang nicht Auto fahren, keinen Alkohol trinken und keine wichtigen Entscheidungen treffen. Bitte trinken Sie in den nächsten Tagen viel Wasser, um die Blase durchzuspülen."}, {"theme": "1. Hämaturie", "section": "AA", "type": "qa", "q": "Warum vermuten Sie ein Blasenkarzinom, und welche DD kommen infrage?", "a": "Leitsymptom ist die schmerzlose (indolente) Makrohämaturie. Bei schmerzhafter Hämaturie eher Nephrolithiasis.\nDD: Infektionen (Zystitis, Pyelonephritis, Glomerulonephritis, Urogenitaltuberkulose), Parasiten (Schistosomiasis), Konkremente, Tumoren (Nieren-, Harnleiter-, Prostatakarzinom, benigne Polypen), Prostataerkrankungen (BPH, Prostatitis), Endometriose der Blase, Medikamente (Antikoagulantien, Cyclophosphamid), Marschhämaturie. Bei jungen Frauen: Menstruation als Störquelle ausschließen (Präanalytik)."}, {"theme": "1. Hämaturie", "section": "AA", "type": "qa", "q": "Wie sieht Ihr diagnostisches Vorgehen bei V.a. Blasenkarzinom aus?", "a": "Körperliche Untersuchung: Inspektion (Genitale, Hoden), Palpation (Abdomen, Lymphknoten, Flanken-Klopfschmerz), Auskultation Abdomen, DRU (Prostata, rektale Raumforderung).\nLabor/Urin: Blutbild, CRP, BSG; Kreatinin, Harnstoff, Harnsäure, Elektrolyte; Urinstatus, Sediment, Urinkultur, Urinzytologie.\nBildgebung: Abdomensonographie, CT-Pyelographie mit Kontrastmittel.\nGoldstandard: Urozystoskopie mit Biopsie."}, {"theme": "1. Hämaturie", "section": "AA", "type": "qa", "q": "Was versteht man unter Hämaturie, und wie wird sie eingeteilt?", "a": "Erythrozyten im Urin, abzugrenzen von der Hämoglobinurie (nur freies Hämoglobin).\nMikrohämaturie: Urin makroskopisch unauffällig, Nachweis nur per Teststreifen oder Sediment.\nMakrohämaturie: sichtbare Rotfärbung des Urins.\nDysmorphe Erythrozyten (z. B. Akanthozyten) im Sediment → Hinweis auf glomeruläre Ursache."}, {"theme": "1. Hämaturie", "section": "AA", "type": "qa", "q": "Was bedeuten die Befunde „zottig“ und „gestielt“?", "a": "Zottig: nicht glatte, blumenkohlartige Oberfläche → spricht für Malignität.\nGestielt: polypenähnlich, mit klar abgrenzbarem Hals → eher gutartig."}, {"theme": "1. Hämaturie", "section": "AA", "type": "qa", "q": "Nennen Sie die wichtigen urologischen Begriffe zur Miktion.", "a": "Dysurie: erschwertes, schmerzhaftes Wasserlassen.\nAlgurie: Schmerzen beim Wasserlassen.\nPollakisurie: häufiges Wasserlassen in kleinen Mengen.\nStrangurie: brennende, krampfartige Schmerzen in Harnröhre/Blase beim Wasserlassen."}, {"theme": "1. Hämaturie", "section": "AA", "type": "qa", "q": "Welche Risikofaktoren für ein Urothelkarzinom kennen Sie?", "a": "Höheres Lebensalter, männliches Geschlecht (doppelt so häufig), Nikotinabusus, berufliche Exposition gegenüber aromatischen Aminen (Maler, Gummiindustrie, Friseure, LKW-Fahrer), Medikamente (Cyclophosphamid, Pioglitazon)."}, {"theme": "1. Hämaturie", "section": "AA", "type": "qa", "q": "Wie wird das Urothelkarzinom therapiert?", "a": "Nicht-muskelinvasiv: TUR-B, danach intravesikale Instillation mit BCG oder Mitomycin-C zur Rezidivprophylaxe.\nCarcinoma in situ: BCG-Instillation ist Standard, gefolgt von Kontroll-Zystoskopie nach 1–4 Wochen.\nMuskelinvasiv: radikale Zystektomie + pelvine Lymphadenektomie + Harnableitung (Ileum-Neoblase oder Harnleiterhautfistel) + perioperative Chemotherapie.\nMetastasiert: palliative Chemotherapie."}, {"theme": "1. Hämaturie", "section": "AA", "type": "qa", "q": "Besteht ein Zusammenhang zwischen Urethrozystoskopie und Hirnschädigung?", "a": "In extrem seltenen Fällen kann Gleitgel oder ein Medikament einen anaphylaktischen Schock auslösen. Der konsekutive Blutdruckabfall führt zu zerebraler Hypoxie und damit zu Hirnschädigung."}, {"theme": "1. Hämaturie", "section": "AA", "type": "qa", "q": "Die Patientin trinkt Kirschlikör – besteht hier ein Zusammenhang zu den Beschwerden?", "a": "Nein. Kirschlikör ist ein süßes, stark alkoholisches Getränk. Da die Patientin diesen bereits seit Jahren vor Auftreten der Beschwerden konsumiert, besteht kein kausaler Zusammenhang zur akuten Hämaturie."}, {"theme": "1. Hämaturie", "section": "AA", "type": "qa", "q": "Wie sieht die Thromboseprophylaxe aus?", "a": "Gabe von niedermolekularem Heparin, z. B. Clexane 10.000 IE subkutan."}, {"theme": "1. Hämaturie", "section": "AA", "type": "tableau", "q": "Tableau clinique der Hämaturie / des Urothelkarzinoms?", "a": "Schmerzlose Makrohämaturie (sichtbares Blut ohne Schmerzen) → Leitsymptom.\nMikrohämaturie (nur laborchemisch nachweisbar).\nDysurie (Schmerzen/Brennen beim Wasserlassen).\nPollakisurie (häufiges Wasserlassen in kleinen Mengen).\nDrangsymptomatik (plötzlicher, starker Harndrang).\nFlankenschmerz (bei Harnstau).\nGewichtsverlust, Kachexie → Spätsymptom.\nAnämie (durch chronischen Blutverlust)."}, {"theme": "1. Hämaturie", "section": "AA", "type": "dd", "q": "Differentialdiagnosen der Hämaturie (Fachbegriffe)?", "a": "Urolithiasis.\nHarnwegsinfekt / Zystitis.\nNierenzellkarzinom.\nProstatakarzinom.\nBenigne Prostatahyperplasie (BPH).\nStrahlenzystitis.\nKoagulopathie / Antikoagulation."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AP", "type": "qa", "q": "Gibt es Alternativen zur Magenspiegelung?", "a": "Ja, Ultraschall oder CT. Die tun nicht weh, aber wir sehen dabei nicht direkt auf die Schleimhaut und können keine Gewebeprobe nehmen. Für eine sichere Diagnose brauchen wir die Spiegelung."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AP", "type": "qa", "q": "Was ist eine Färbeendoskopie?", "a": "Wir spritzen dabei eine blaue Flüssigkeit auf die Magenschleimhaut – dadurch sieht man kranke Stellen besser. Das machen wir aber kaum noch, weil unsere normalen Kameras heute schon sehr gut sind."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AP", "type": "qa", "q": "Wie oft gibt es schwere Komplikationen?", "a": "Die genaue Zahl für unser Haus weiß ich nicht auswendig – das frage ich nachher nach. Das Risiko ist aber extrem gering. Wir machen den Eingriff nur, weil er für Ihre Gesundheit sehr wichtig ist."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AP", "type": "qa", "q": "Sie machen mich noch ängstlicher!", "a": "Das tut mir leid, das ist nicht meine Absicht. Ich bin gesetzlich verpflichtet, Ihnen alle theoretischen Risiken aufzuzählen. Die Magenspiegelung ist ein sehr sicherer Routineeingriff, den wir hier täglich problemlos durchführen."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Warum vermuten Sie ein Ulcus ventriculi, und welche DD kommen infrage?", "a": "Typische Klinik: epigastrischer Schmerz, der direkt nach dem Essen oder nahrungsunabhängig auftritt.\nDD: Ulcus duodeni (Nüchternschmerz, bessert sich nach Essen), Magenkarzinom (nur histologisch auszuschließen), Cholezystitis (Ausschluss per Sonographie), Pankreatitis (Amylase/Lipase), Hinterwandinfarkt (EKG + Troponin), GERD/Refluxösophagitis (pH-Metrie oder ÖGD), Ulcus simplex Dieulafoy, Mallory-Weiss-Syndrom, Ösophagusvarizen, Hiatushernie."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Wie sieht Ihr diagnostisches Vorgehen bei V.a. Ulcus ventriculi aus?", "a": "Palpation: epigastrischer Druckschmerz, Abwehrspannung (V.a. Perforation). Auskultation: Darmgeräusche, fehlend → paralytischer Ileus?\nLabor: Blutbild, CRP, BSG, Leukozyten; Amylase, Lipase; Serumgastrin (Zollinger-Ellison?).\nGoldstandard: ÖGD mit mindestens 6 Biopsien aus Ulkusrand und -grund, obligat bei > 2 cm.\nHP-Diagnostik: Urease-Schnelltest oder Histologie (invasiv), Atemtest oder Stuhl-Antigen (nicht-invasiv).\nRöntgen-Abdomen im Stehen: freie Luft unter dem Zwerchfell → Perforation."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Was ist ein Ulkus, und wie entsteht es?", "a": "Schleimhautdefekt, der die Lamina muscularis mucosae durchbricht.\nPathophysiologie: Ungleichgewicht zwischen aggressiven Faktoren (Magensäure, Pepsin, Gallensäuren) und Schutzfaktoren (Muzinbarriere, gute Durchblutung, Prostaglandine)."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Nennen Sie die Johnson-Klassifikation des Magenulkus.", "a": "Typ I: kleine Kurvatur, meist subazid (~60%).\nTyp II: Magen + Duodenum kombiniert, normal- oder hyperazid (~20%).\nTyp III: präpylorisch, meist hyperazid."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Nennen Sie die ABC-Klassifikation der chronischen Gastritis.", "a": "Typ A (Autoimmun): Antikörper gegen Belegzellen → Vitamin-B12-Mangel → perniziöse Anämie.\nTyp B (Bakteriell): Helicobacter pylori, häufigste Form.\nTyp C (Chemisch): NSAR, Alkohol, Gallereflux, Rauchen."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Welche Komplikationen kann ein Ulcus ventriculi haben?", "a": "Blutung (Hämatemesis, Meläna, Anämie).\nPerforation (freie Luft, akute Peritonitis).\nMagenausgangsstenose (Sanduhrmagen, Narbenstrikturen).\nMaligne Entartung (Magenkarzinom)."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Was ist ein Ulcus simplex Dieulafoy?", "a": "Schleimhautläsion durch eine fehlangelegte, aneurysmatisch veränderte Arteriole → plötzliche, lebensbedrohliche Blutung."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Was ist ein Mallory-Weiss-Syndrom?", "a": "Longitudinale Schleimhauteinrisse am gastroösophagealen Übergang durch forciertes Erbrechen, typisch bei chronischem Alkoholabusus → schmerzhafte Hämatemesis."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Was ist ein Zollinger-Ellison-Syndrom?", "a": "Gastrinproduzierender Tumor (Gastrinom) im Pankreas oder Duodenum → schwere, rezidivierende peptische Ulzera durch Hypergastrinämie."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Wie unterscheiden sich Ulcus duodeni und Ulcus ventriculi klinisch?", "a": "Ulcus duodeni: Nüchternschmerz, bessert sich nach dem Essen.\nUlcus ventriculi: Schmerz nach dem Essen oder nahrungsunabhängig."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Wo liegt die häufigste Lokalisation von Ulcus ventriculi und Ulcus duodeni?", "a": "Ulcus ventriculi: kleine Kurvatur und Antrum.\nUlcus duodeni: Bulbus duodeni."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Warum entnimmt man Biopsien aus Ulkusrand und -grund?", "a": "Erstens zum Ausschluss eines Magenkarzinoms, zweitens zum Nachweis oder Ausschluss von Helicobacter pylori."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Wie sieht die Eradikationstherapie (Triple-Therapie) bei Helicobacter pylori aus?", "a": "PPI (z. B. Pantoprazol 40 mg 2×/Tag) + Amoxicillin 1000 mg + Clarithromycin 500 mg für 7 Tage. Danach PPI in Standarddosis weiterführen."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Wann erfolgt die Kontrollendoskopie nach Ulcus ventriculi?", "a": "Nach 4–6 Wochen, zur Kontrolle des Therapieerfolgs und zum Ausschluss von Malignität."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Wie wirken Protonenpumpeninhibitoren (PPI)?", "a": "PPI hemmen irreversibel die H⁺/K⁺-ATPase (Protonenpumpe) in den Belegzellen → die Säureproduktion wird blockiert."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Wie sieht die Thromboseprophylaxe bei Ulkus aus?", "a": "Niedermolekulares Heparin (z. B. Clexane 10.000 IE s.c.) – nur wenn keine akute gastrointestinale Blutung vorliegt."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Wie gehen Sie bei einer oberen gastrointestinalen Blutung vor?", "a": "Stationäre Aufnahme, Vitalzeichen überwachen, Nüchternheit, O2-Gabe, i.v.-Zugang.\nInfusionstherapie, ggf. Erythrozytenkonzentrate.\nNotfall-ÖGD zur Blutstillung: Adrenalin-Unterspritzung, Fibrinkleber, Hämoclips, Thermokoagulation."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Wie behandeln Sie blutende Ösophagusvarizen?", "a": "Goldstandard: endoskopische Gummibandligatur. Alternativ: Polidocanol-Sklerosierung. Medikamentös: Somatostatin oder Vasopressin. Ultima Ratio: Sengstaken-Blakemore-Ballonsonde."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Nennen Sie die Forrest-Klassifikation der oberen gastrointestinalen Blutung.", "a": "Ia: arteriell spritzend.\nIb: Sickerblutung.\nIIa: sichtbarer Gefäßstumpf.\nIIb: Koagelauflagerung.\nIIc: Hämatinauflagerung (schwarz).\nIII: sauberer Ulkusgrund, keine Blutung."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Was ist ein Barrett-Ösophagus?", "a": "Umwandlung von Plattenepithel zu Zylinderepithel (intestinale Metaplasie) bei chronischem GERD → obligate Präkanzerose für das Adenokarzinom."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Was ist portale Hypertension?", "a": "Dauerhafter Pfortaderdruck über 12 mmHg (normal 3–6 mmHg). Ursachen: Leberzirrhose, Pfortaderthrombose. Komplikationen: Ösophagus-, Fundus-, anorektale Varizen. Therapie: Propranolol, Spironolacton, Nitrate."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Was ist ein Krukenberg-Tumor?", "a": "Magenkarzinom-Metastasierung, meist diffuser Typ mit Siegelringzellen, in die Ovarien – typischerweise beidseitig."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "qa", "q": "Definieren Sie Hämatemesis, Kaffeesatzerbrechen, Meläna und Hämatochezie.", "a": "Hämatemesis: Erbrechen von frischem Blut, proximale akute Blutung.\nKaffeesatzerbrechen: Blut + Magensäure = Hämatin, braun-schwarz.\nMeläna (Teerstuhl): glänzend-schwarzer Stuhl, Blut über 5–8 h im GI-Trakt.\nHämatochezie: frisches rotes Blut per rectum, untere gastrointestinale Blutung."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "tableau", "q": "Tableau clinique des Ulkus?", "a": "Epigastrischer Schmerz.\nNüchternschmerz / nächtlicher Schmerz → typisch für Duodenalulkus.\nPostprandialer Schmerz → typisch für Magenulkus.\nSodbrennen.\nÜbelkeit, Erbrechen.\nAppetitlosigkeit.\nBesserung durch Essen oder Antazida → beim Duodenalulkus.\nHämatemesis → Alarmsymptom.\nMeläna / Teerstuhl → Alarmsymptom.\nPerforation → brettharter Bauch, akutes Abdomen, chirurgischer Notfall."}, {"theme": "2. Ulkus (Magengeschwür)", "section": "AA", "type": "dd", "q": "Differentialdiagnosen des Ulkus (Fachbegriffe)?", "a": "Gastritis.\nGastroösophageale Refluxkrankheit (GERD).\nFunktionelle Dyspepsie.\nMagenkarzinom.\nPankreatitis.\nCholezystitis / Cholelithiasis.\nMyokardinfarkt (atypisch)."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AP", "type": "qa", "q": "Gibt es Alternativen zur Darmspiegelung?", "a": "Ja: Ultraschall, CT, Röntgen oder Kapselkamera. Vorteil: kein Schmerz. Nachteil: wir sehen nicht direkt auf die Schleimhaut, können keine Gewebeprobe nehmen, und es gibt oft Strahlenbelastung."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AP", "type": "qa", "q": "Was ist eine Färbeendoskopie?", "a": "Wir sprühen einen harmlosen Farbstoff auf die Schleimhaut – damit sieht man kranke Stellen besser. Das machen wir aber kaum noch, weil unsere normalen Kameras heute sehr gut sind."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AP", "type": "qa", "q": "Was ist das CO2, das Sie bei der Darmspiegelung verwenden?", "a": "Das ist Kohlendioxid – ein harmloses Gas, das wir auch selbst ausatmen. Wir nutzen es, um den Darm für die Untersuchung leicht aufzuweiten."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AP", "type": "qa", "q": "Ich will eine Vollnarkose!", "a": "Das ist möglich, wenn Sie es unbedingt wünschen. Wir empfehlen aber eine Beruhigungsspritze (Sedierung) – das ist schonender und hat weniger Risiken als eine echte Vollnarkose."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AP", "type": "qa", "q": "Was machen Sie, falls ein Durchbruch (Perforation) passiert?", "a": "Das ist extrem selten. Falls es passiert, müssen wir operieren: Wir nähen das Loch sofort zu, und Sie bekommen ein Antibiotikum gegen Entzündungen."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AP", "type": "qa", "q": "Was machen Sie bei einer Blutung?", "a": "Blutungen können wir meistens direkt bei der Spiegelung stoppen – mit einem Medikament, Hitze oder einer kleinen Metallklammer. Eine Operation ist fast nie nötig."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AP", "type": "qa", "q": "Was ist ein Polyp?", "a": "Das ist eine gutartige Wucherung der Schleimhaut. Ursachen können fettiges Essen, Bewegungsmangel, Übergewicht, Alkohol, Rauchen oder Vererbung sein."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AP", "type": "qa", "q": "Wie wird ein Polyp entfernt?", "a": "Direkt bei der Spiegelung. Wir schieben eine feine Drahtschlinge durch das Gerät, trennen den Polypen mit Strom ab und ziehen ihn heraus. Davon spüren Sie gar nichts."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AP", "type": "qa", "q": "Habe ich danach Blähungen?", "a": "Ja, das ist ganz normal. Am besten hilft Bewegung und Herumlaufen. Meiden Sie in den ersten Tagen blähende Lebensmittel wie Bohnen oder Kohl."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "qa", "q": "Welche endoskopischen Befunde sehen Sie bei Colitis ulcerosa und Morbus Crohn?", "a": "Colitis ulcerosa: diffuse Rötung, Kontaktblutungen, unscharf begrenzte Ulzerationen, Pseudopolypen.\nMorbus Crohn: aphthöse Läsionen, scharf begrenzte (landkartenartige) Ulzerationen, Stenosen, Fisteln, Pflastersteinrelief."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "qa", "q": "Welche Risiko- und Schutzfaktoren kennen Sie beim Kolonkarzinom?", "a": "Risiko: positive Familienanamnese, FAP, HNPCC, kolorektale Adenome, Colitis ulcerosa, Diabetes Typ 2, Alter > 40 J., Adipositas, fleisch- und fettreiche Ernährung.\nSchutz: körperliche Aktivität, ballaststoff-, gemüse- und kalziumreiche Ernährung."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "qa", "q": "Wie behandeln Sie ein Reizdarmsyndrom?", "a": "Symptomatisch: Spasmolytika (Buscopan, Mebeverin), Laxantien, Antidiarrhoika.\nLifestyle: ballaststoffreiche Kost, regelmäßige Mahlzeiten, Stressabbau, Psychotherapie."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "qa", "q": "Wie ist das Polypenmanagement und die Kontrollintervalle geregelt?", "a": "≤ 5 mm: Biopsiezange. > 5 mm: elektrische Schlinge.\nKontrollkoloskopie: alle 10 Jahre bei kleinem, nicht-neoplastischem Polyp; alle 5 Jahre bei 1–2 Adenomen < 1 cm; alle 3 Jahre bei 3–10 Adenomen, > 1 cm oder villös/HGIN."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "qa", "q": "Wie sieht die Therapie des Morbus Crohn aus?", "a": "Im Schub: Mesalazin + Glukokortikoide (Prednison).\nErhaltung: Azathioprin, Methotrexat.\nChirurgisch: nur bei Komplikationen (Fisteln, Abszesse, Perforation)."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "qa", "q": "Was ist eine Zöliakie?", "a": "Immunologische Unverträglichkeit der Dünndarmschleimhaut gegenüber Gluten → Zottenatrophie → Malabsorption. Klinik: reizdarmähnliche Beschwerden, Fettstuhl (Steatorrhö), vorgewölbtes Abdomen, Tabaksbeutelgesäß (Lipoatrophie)."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "qa", "q": "Was sind Pseudopolypen?", "a": "Harmlose Schleimhautinseln, die bei schwerer Colitis ulcerosa stehen bleiben, während die Umgebung geschwürig zerstört ist. Keine echten Tumorneubildungen."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "qa", "q": "Unterscheiden Sie LGIN und HGIN.", "a": "LGIN (low-grade): leichte Zellveränderung, geringes Entartungsrisiko.\nHGIN (high-grade): schwere Zellveränderung, ernsthafte Präkanzerose."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "qa", "q": "Was ist eine Piecemeal-Resektion?", "a": "Stückweise Abtragung eines großen, flachen Polypen mit der Schlinge, weil er nicht en bloc entfernt werden kann – höheres Risiko für Gewebereste."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "qa", "q": "Wie definieren Sie eine Diarrhö, und wie unterteilen Sie die Ursachen?", "a": "Mindestens 3 flüssige Stühle pro Tag.\nUrsachen: infektiös (Bakterien, Viren, Parasiten) vs. nicht-infektiös (CED, Tumor, RDS, Unverträglichkeiten, Medikamente).\nTherapie: Flüssigkeits- und Volumenersatz oral oder i.v. (Ringer-Laktat, NaCl)."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "qa", "q": "Was ist eine FAP?", "a": "Familiäre adenomatöse Polyposis: autosomal-dominant, über 100 Adenome im Kolon → unweigerliche maligne Entartung → prophylaktische Proktokolektomie mit ileoanaler Pouch-Anastomose."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "qa", "q": "Charakterisieren Sie den Morbus Crohn.", "a": "Chronisch-entzündliche Darmerkrankung mit diskontinuierlichem, transmuralem Befall des gesamten GI-Trakts, meist terminales Ileum + Kolon. Ursache: Autoimmunreaktion."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "qa", "q": "Charakterisieren Sie die Colitis ulcerosa.", "a": "Kontinuierliche Ausbreitung von distal nach proximal, streng auf Kolon und Mukosa/Submukosa beschränkt, immer mit blutig-schleimiger Diarrhö."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "qa", "q": "Was ist ein toxisches Megakolon?", "a": "Akute, lebensbedrohliche Erweiterung des Dickdarms bei schwerer Kolitis, meist CED-Komplikation → sofortige Intensivtherapie oder Operation."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "qa", "q": "Welche Resektion wählen Sie je nach Lage des Kolonkarzinoms?", "a": "Zäkum/Ascendens → Hemikolektomie rechts.\nTransversum → Transversumresektion.\nDescendens/Sigma → Hemikolektomie links bzw. Sigmaresektion."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "qa", "q": "Wie sieht die Vorsorge-Koloskopie aus?", "a": "Ab 50 Jahren alle 10 Jahre, bei familiärer Belastung ab 40–45 Jahren."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "qa", "q": "Was ist der Guajak-Test?", "a": "Biochemischer Nachweis von okkultem, also unsichtbarem, Blut im Stuhl."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "qa", "q": "Was ist eine Divertikulitis?", "a": "Ausstülpungen von Mukosa und Submukosa durch Muskelschwachstellen des Sigmas, begünstigt durch ballaststoffarme Ernährung und Obstipation. Die Entzündung heißt Divertikulitis, umgangssprachlich auch „Linksappendizitis“. Labor: erhöhte Entzündungswerte. Therapie: unkompliziert konservativ, kompliziert operativ."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "qa", "q": "Wann ist die Diagnose Reizdarmsyndrom zulässig?", "a": "Das Reizdarmsyndrom ist eine Ausschlussdiagnose – nur zu stellen, wenn alle organischen Differenzialdiagnosen ausgeschlossen sind."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "tableau", "q": "Tableau clinique des Kolonkarzinoms?", "a": "Änderung der Stuhlgewohnheiten → Leitsymptom.\nHämatochezie → eher linksseitiger Tumor.\nOkkultes Blut im Stuhl → Zufallsbefund beim Screening.\nBleistiftdünner Stuhl → Zeichen einer Einengung.\nMeteorismus / Blähungen.\nAbdominelle Schmerzen.\nPalpabler Tumor → Spätsymptom.\nGewichtsverlust, Kachexie → Spätsymptom.\nAnämie.\nIleus → Notfall.\nRechtsseitiger Tumor: okkulte Blutung + Anämie, spät symptomatisch.\nLinksseitiger Tumor: Hämatochezie + Stenosezeichen, früh symptomatisch."}, {"theme": "3. Reizdarmsyndrom / Kolonkarzinom", "section": "AA", "type": "dd", "q": "Differentialdiagnosen des Kolonkarzinoms (Fachbegriffe)?", "a": "Rektumkarzinom.\nDivertikulitis.\nMorbus Crohn / Colitis ulcerosa.\nKolonpolypen.\nHämorrhoiden.\nIschämische Kolitis.\nReizdarmsyndrom (RDS).\nAppendizitis."}, {"theme": "4. Appendizitis", "section": "AP", "type": "qa", "q": "Warum bin ich erkrankt?", "a": "Die genaue Ursache lässt sich oft nicht sicher feststellen. Eine häufige Theorie: Der Ausgang des Blinddarms war durch einen kleinen Kotstein oder Fremdkörper verstopft – dadurch hat sich das Gewebe entzündet."}, {"theme": "4. Appendizitis", "section": "AP", "type": "qa", "q": "Warum nicht nur Medikamente?", "a": "Bei einer so starken Entzündung sind Medikamente allein nicht sicher genug. Wir müssen operieren, um einen Durchbruch zu verhindern, der zu einer gefährlichen Bauchfellentzündung führen könnte."}, {"theme": "4. Appendizitis", "section": "AP", "type": "qa", "q": "Warum CO2 bei der Operation?", "a": "Das Gas hilft uns, den Bauchraum sanft zu weiten, damit wir besser sehen können. Es ist völlig harmlos – der Rest wird einfach über die Lunge ausgeatmet."}, {"theme": "4. Appendizitis", "section": "AP", "type": "qa", "q": "Warum muss ich nüchtern sein?", "a": "Während der Narkose entspannen sich die Muskeln. Wenn Sie nüchtern sind, minimieren wir das Risiko, dass Mageninhalt zurückfließt und in die Lunge gelangt."}, {"theme": "4. Appendizitis", "section": "AP", "type": "qa", "q": "Warum darf ich nach der OP nicht sofort essen?", "a": "Ihr Darm muss nach der Narkose erst langsam wieder „aufwachen“. Isst man zu früh, kommt es oft zu Übelkeit. Wir fangen mit etwas Wasser oder Tee an."}, {"theme": "4. Appendizitis", "section": "AP", "type": "qa", "q": "Warum wird der Blinddarm ins Labor geschickt?", "a": "Wir schicken ihn routinemäßig zur histologischen Untersuchung, um die Entzündung zu bestätigen und andere Veränderungen wie Tumoren sicher auszuschließen."}, {"theme": "4. Appendizitis", "section": "AP", "type": "qa", "q": "Was ist eine Drainage?", "a": "Ein kleiner, weicher Schlauch, den wir im Bauchraum belassen, um Wundflüssigkeit nach außen zu leiten. Er wird meist nach wenigen Tagen schmerzfrei entfernt."}, {"theme": "4. Appendizitis", "section": "AP", "type": "qa", "q": "Wann kann ich wieder arbeiten oder Sport treiben?", "a": "Arbeit: nach etwa 2 Wochen, je nach Belastung. Sport, besonders Bauchmuskeltraining: nach etwa 4 Wochen. Leichte Spaziergänge sind früher möglich."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Wie entsteht eine Appendizitis?", "a": "Lumenobstruktion durch Kotsteine (intraluminal) oder geschwollene Lymphknoten (extraluminal) → Sekretstau → Druckerhöhung → Minderperfusion → bakterielle Invasion."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Nennen Sie die Entzündungsstadien der Appendizitis.", "a": "Katarrhalisch: Ödem, Hyperämie – einziges reversibles Stadium.\nUlzero-phlegmonös: diffus-eitrige Infiltration der gesamten Appendixwand mit herdförmigen Ulzera.\nGangränös: Wandnekrose durch Ischämie, hohe Perforationsgefahr.\nPerforiert: Durchbruch – gedeckt als perityphlitischer Abszess, ungedeckt als diffuse Peritonitis."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Welche therapeutischen Optionen gibt es bei Appendizitis?", "a": "Standard: laparoskopische Appendektomie.\nKonservativ, nur im katarrhalischen Stadium: Bettruhe, Nahrungskarenz, Antibiotika (Cefuroxim + Metronidazol).\nFreie Perforation: offene Appendektomie + Abdominallavage + Drainage.\nPerityphlitischer Abszess: CT/US-gesteuerte Drainage + Intervallappendektomie."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Beschreiben Sie den Ablauf einer laparoskopischen Appendektomie.", "a": "Drei Trokare einbringen → diagnostische Laparoskopie → Appendix darstellen → Gefäße im Mesenterium ligieren → Appendixbasis mit Röder-Schlinge absetzen → Bergung im Bergebeutel."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Beschreiben Sie den typischen Symptomverlauf der Appendizitis.", "a": "Der Schmerz wandert von epigastrisch/periumbilikal in den rechten Unterbauch. Begleitsymptome: Inappetenz, Übelkeit, Erbrechen, subfebrile Temperaturen, Achsel-Rektum-Differenz > 1°C."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Was versteht man unter dem „faulen Frieden“?", "a": "Plötzlicher Schmerznachlass nach Perforation, weil der Druck im Lumen schlagartig abfällt. Danach folgt durch die Peritonitis wieder stärkster Schmerz – akut lebensbedrohlich."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Nennen Sie die klinischen Appendizitis-Zeichen.", "a": "McBurney-Punkt: Mitte zwischen Bauchnabel und rechtem Beckenkamm.\nLanz-Punkt: rechtes Drittel der Linie zwischen beiden Beckenkämmen.\nBlumberg-Zeichen: kontralateraler Loslassschmerz.\nRovsing-Zeichen: Schmerz rechts beim retrograden Ausstreichen des Kolons.\nPsoas-Zeichen: Schmerz beim Anheben des rechten Beins → retrozökale Lage.\nDouglas-Schmerz: Druckschmerz des Peritoneums bei der DRU."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Was bedeutet Loslassschmerz?", "a": "Schmerz beim plötzlichen Loslassen der Bauchdecke – Zeichen für peritoneale Reizung, z. B. bei Peritonitis oder Appendizitis."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Was ist das Kokardenphänomen im Ultraschall?", "a": "Zielscheibenförmiges Bild durch Wechsel von echoarmen und echoreichen Wandschichten der entzündeten Appendix. Klassisches sonografisches Zeichen für eine entzündliche Wandverdickung oder Invagination – auch bei Morbus Crohn und Divertikulitis."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Welche Laborbefunde erwarten Sie bei Appendizitis?", "a": "Leukozytose, CRP↑, BSG↑.\nBeta-HCG zum Ausschluss einer Eileiterschwangerschaft.\nUrinstatus zum Ausschluss von Harnwegsinfekt oder Nephrolithiasis."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Nennen Sie Vor- und Nachteile der konservativen Therapie.", "a": "Vorteile: kein OP-Risiko, keine unnötige Appendektomie.\nNachteile: hohe Aggravationsgefahr, hohe Rezidivrate."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Unterscheiden Sie mechanischen und paralytischen Ileus.", "a": "Mechanisch: physikalisches Hindernis (Tumor, Adhäsionen, Kotsteine) → Operation.\nParalytisch: funktionelle Darmlähmung, z. B. postoperativ oder bei Peritonitis → konservativ.\nDiagnose: Röntgen-Abdomen im Stehen mit Spiegelbildungen, CT."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Unterscheiden Sie Sepsis und Bakteriämie.", "a": "Sepsis: lebensbedrohliche Organdysfunktion durch dysregulierte Immunantwort auf eine Infektion.\nBakteriämie: nur laborchemischer Nachweis von Bakterien im Blut, ohne zwingende Symptome."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Nennen Sie die SIRS-Kriterien.", "a": "Mindestens 2 von 4: Temperatur über 38°C oder unter 36°C, Herzfrequenz über 90/min, Atemfrequenz über 20/min, Leukozyten über 12.000 oder unter 4.000/µl."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Unterscheiden Sie Exsudat und Transsudat.", "a": "Exsudat: entzündlich, protein- und zellreich.\nTranssudat: nicht-entzündlich, protein- und zellarm, z. B. bei Herzinsuffizienz oder Leberzirrhose."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Unterscheiden Sie Empyem und Abszess.", "a": "Empyem: Eiter in einem präformierten, also bereits vorhandenen Hohlraum, z. B. Pleura oder Gallenblase.\nAbszess: Eiter in einem neu gebildeten Hohlraum durch Gewebenekrose."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Warum verwendet man CO2 bei Laparoskopien?", "a": "CO2 ist nicht brennbar und damit sicher beim Elektrokauter, und es hat eine hohe Diffusionskapazität, wird also schnell über die Lunge abgeatmet – minimales Embolierisiko."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Wie sieht die Thromboseprophylaxe nach Appendektomie aus?", "a": "Medikamentös: niedermolekulares Heparin (z. B. Enoxaparin) s.c.\nPhysikalisch: Thromboseprophylaxestrümpfe.\nFunktionell: Frühmobilisation – die effektivste Maßnahme."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Wie sieht der postoperative Kostaufbau aus?", "a": "Nüchternheit → Flüssigkeit (Tee) → Suppe/pürierte Kost → leichte Vollkost → normale Vollkost."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Wann ist eine Laparoskopie kontraindiziert?", "a": "Bei diffuser Peritonitis (dann offene OP mit Abdominallavage), ausgeprägten Adhäsionen, massivem Meteorismus, hämodynamischer Instabilität (Schock)."}, {"theme": "4. Appendizitis", "section": "AA", "type": "qa", "q": "Was ist ein Meckel-Divertikel?", "a": "Echte, angeborene Ausstülpung des Ileums, 30–60 cm vor der Ileozökalklappe. Ursache: unvollständige Rückbildung des Ductus omphaloentericus. Kann ektopes Magenepithel enthalten → schmerzlose Blutung."}, {"theme": "4. Appendizitis", "section": "AA", "type": "tableau", "q": "Tableau clinique der Appendizitis?", "a": "Schmerzwanderung von epigastrisch/periumbilikal in den rechten Unterbauch.\nInappetenz, Übelkeit, Erbrechen.\nSubfebrile Temperatur, Achsel-Rektum-Differenz > 1°C.\nLoslassschmerz.\nPositive Appendizitis-Zeichen: McBurney, Lanz, Blumberg, Rovsing, Psoas, Douglas."}, {"theme": "4. Appendizitis", "section": "AA", "type": "dd", "q": "Differentialdiagnosen der Appendizitis (Fachbegriffe)?", "a": "Gastrointestinal: Gastroenteritis, Cholezystitis, Pankreatitis, Morbus Crohn, Divertikulitis.\nGynäkologisch: Extrauteringravidität, Adnexitis, Ovarialtorsion.\nUrologisch: Urolithiasis, Pyelonephritis."}, {"theme": "5. Cholezystitis", "section": "AP", "type": "qa", "q": "Kann ich ohne Gallenblase leben?", "a": "Ja, absolut kein Problem. Die Gallenblase ist nur ein kleiner Speicher – produziert wird die Galle in der Leber. Nach der OP fließt die Galle einfach direkt in den Darm. Ihre Verdauung funktioniert genauso gut wie vorher."}, {"theme": "5. Cholezystitis", "section": "AP", "type": "qa", "q": "Warum keine Hybrid-NOTES-Operation?", "a": "Das ist ein sehr neues Verfahren über die Scheide oder den Darm. Wir machen das nicht, weil uns die Routine fehlt. Die normale Bauchspiegelung ist bei uns ein täglicher Standardeingriff und für Sie viel sicherer."}, {"theme": "5. Cholezystitis", "section": "AP", "type": "qa", "q": "Warum keine Single-Port-Operation?", "a": "Dabei operiert man durch nur einen einzigen Schnitt am Nabel. Das sieht zwar besser aus, aber es nimmt uns die Sicht und den Arbeitsraum. Die normale Bauchspiegelung bietet Ihnen einfach mehr Sicherheit."}, {"theme": "5. Cholezystitis", "section": "AP", "type": "qa", "q": "Wie soll ich mich nach der OP ernähren?", "a": "Keine strenge Diät nötig. Am Anfang einfach weniger Fettiges und Blähendes, und lieber mehrere kleine Mahlzeiten über den Tag verteilen."}, {"theme": "5. Cholezystitis", "section": "AP", "type": "qa", "q": "Warum nicht Medikamente statt Operation?", "a": "Tabletten helfen hier leider nicht dauerhaft. Die Entzündung kommt immer wieder, und Gallensteine können den Gallengang verstopfen. Die Operation ist der einzige sichere Weg, das Problem zu lösen."}, {"theme": "5. Cholezystitis", "section": "AP", "type": "qa", "q": "Warum nicht rauchen?", "a": "Rauchen verengt die Blutgefäße. Weniger Sauerstoff führt zu schlechterer Wundheilung und höherem Infektionsrisiko."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "qa", "q": "Welche Ursachen der Cholezystitis kennen Sie?", "a": "Kalkulös (90%): Gallenstein verstopft den Ductus cysticus → Gallestau → bakterielle Entzündung.\nAkalkulös (10%): „Stressgalle“ bei Schwerkranken, z. B. Sepsis oder große Operationen, durch Durchblutungsstörungen."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "qa", "q": "Warum entstehen Gallensteine?", "a": "Ungleichgewicht zwischen steinbildenden Stoffen (Cholesterin, Bilirubin) und lösenden Stoffen (Gallensäuren). Die Galle wird dickflüssig, kristallisiert, und es bilden sich Steine (Cholelithiasis)."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "qa", "q": "Nennen Sie die drei Gallensteintypen mit Häufigkeit.", "a": "Cholesterin-/Gemischtsteine: ~80%.\nPigmentsteine/Bilirubinsteine: ~10%, bei Hämolyse.\nKalksteine: ~10%."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "qa", "q": "Nennen Sie die 6-F-Regel der Risikofaktoren für Gallensteine.", "a": "Female, Fat, Fertile, Forty, Fair, Family."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "qa", "q": "Nennen Sie die Charcot-Trias.", "a": "Schmerzen im rechten Oberbauch, Ikterus, hohes Fieber mit Schüttelfrost – typisch für Cholangitis."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "qa", "q": "Welche Komplikationen kann eine unbehandelte Cholezystitis haben?", "a": "Gallenblasenempyem.\nGangrän (Wandnekrose).\nPerforation → Peritonitis oder Abszess.\nGallensteinileus (Fistelbildung in den Darm).\nPorzellangallenblase (Verkalkung) → Präkanzerose."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "qa", "q": "Nennen Sie die Cholestaseparameter.", "a": "AP↑, Gamma-GT↑, direktes Bilirubin↑."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "qa", "q": "Unterscheiden Sie indirektes und direktes Bilirubin.", "a": "Indirektes Bilirubin: wasserunlöslich, lipophil, Transport zur Leber, erhöht bei Hämolyse.\nDirektes Bilirubin: in der Leber konjugiert, wasserlöslich, Ausscheidung über die Galle, erhöht bei Cholestase."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "qa", "q": "Wie ist der Ikterus einzuteilen?", "a": "Prähepatisch: Hämolyse → indirektes Bilirubin↑.\nIntrahepatisch: Leberzellschaden, z. B. Hepatitis oder Zirrhose → direktes und indirektes Bilirubin↑.\nPosthepatisch: mechanischer Gallestau, z. B. Gallengangstein oder Pankreaskopfkarzinom → direktes Bilirubin↑, dunkler Urin, heller Stuhl."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "qa", "q": "Ab welchem Wert sieht man einen Ikterus?", "a": "An den Skleren ab 2 mg/dl, an der Haut ab 3 mg/dl."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "qa", "q": "Was ist das Murphy-Zeichen?", "a": "Schmerzbedingter Inspirationsstopp beim Einatmen, wenn der Untersucher den rechten Oberbauch unter dem Rippenbogen drückt – pathognomonisch für akute Cholezystitis."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "qa", "q": "Was beschreibt das Courvoisier-Zeichen?", "a": "Eine schmerzlose, prall-elastisch tastbare Gallenblase zusammen mit einem Ikterus. Tritt auf, wenn der Gallenabfluss langsam blockiert wird, z. B. durch einen Tumor."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "qa", "q": "Wie entstehen kolikartige Schmerzen?", "a": "Wellenartige Schmerzattacken durch krampfhafte Kontraktion glatter Muskulatur, z. B. Gallenwege oder Harnleiter, gegen ein Hindernis wie einen Stein."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "qa", "q": "Nennen Sie die sonografischen Zeichen der Cholezystitis.", "a": "Wandverdickung über 3 mm.\nDreischichtung (Wandödem).\nKonkremente mit dorsalem Schallschatten.\nPerichole zystitische Flüssigkeit."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "qa", "q": "Was ist das Mirizzi-Syndrom?", "a": "Ein großer Stein im Ductus cysticus komprimiert von außen den Ductus hepaticus communis → Verschlussikterus, obwohl der Hauptgallengang selbst frei ist."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "qa", "q": "Wie sieht der Therapie-Algorithmus beim Gallensteinleiden aus?", "a": "Asymptomatische Cholezystolithiasis: abwarten, keine OP.\nSymptomatische Cholezystitis: laparoskopische Cholezystektomie innerhalb von 24–72 h + konservative Begleittherapie.\nCholedocholithiasis: erst ERCP zur Steinextraktion, dann elektive Cholezystektomie."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "qa", "q": "Warum wird der Stuhl heller und der Urin dunkler bei posthepatischem Gallestau?", "a": "Die Galle gelangt nicht in den Darm, Sterkobilin fehlt, der Stuhl wird lehmfarben. Direktes Bilirubin weicht ins Blut aus und wird renal ausgeschieden, der Urin wird dunkel."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "qa", "q": "Nennen Sie die Virchow-Trias.", "a": "Verlangsamter Blutfluss / Stase, z. B. bei Immobilität.\nGefäßwandschaden, z. B. durch OP oder Trauma.\nErhöhte Gerinnungsneigung / Hyperkoagulabilität, z. B. bei Adipositas, Pille, Faktor-V-Leiden."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "qa", "q": "Was ist ein Platzbauch?", "a": "Das plötzliche Aufreißen einer Operationswunde am Bauch nach einem chirurgischen Eingriff."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "tableau", "q": "Tableau clinique der Cholezystitis?", "a": "Rechtsseitiger Oberbauchschmerz → Leitsymptom.\nKolikartiger Schmerz → bei Gallenkolik.\nSchmerzausstrahlung in rechte Schulter oder Rücken.\nÜbelkeit, Erbrechen.\nFieber, Schüttelfrost → Zeichen der Entzündung.\nPositives Murphy-Zeichen.\nIkterus → bei Stein im Hauptgallengang.\nAbwehrspannung → bei Komplikation."}, {"theme": "5. Cholezystitis", "section": "AA", "type": "dd", "q": "Differentialdiagnosen der Cholezystitis (Fachbegriffe)?", "a": "Choledocholithiasis.\nCholangitis.\nPankreatitis.\nAppendizitis.\nMagenulkus / Duodenalulkus.\nMyokardinfarkt (atypisch).\nPleuritis / Pneumonie rechts."}, {"theme": "6. Leistenhernie", "section": "AP", "type": "qa", "q": "Was genau ist ein Leistenbruch?", "a": "Knochen brechen hier nicht. Ein Leistenbruch bedeutet, dass es eine kleine Lücke in Ihrer Bauchwand gibt. Durch dieses Loch drückt sich das Bauchfell wie ein kleiner Sack nach außen – manchmal rutscht auch etwas Darm hinein. Das ist die Beule, die Sie sehen."}, {"theme": "6. Leistenhernie", "section": "AP", "type": "qa", "q": "Wie wird das operiert – offen oder Schlüsselloch?", "a": "Es gibt zwei Wege: Bei der Schlüsselloch-Methode machen wir drei winzige Schnitte und reparieren den Bruch von innen mit einer Kamera und einem Netz. Bei der offenen Methode machen wir einen Schnitt direkt in der Leiste und vernähen die Schichten – meistens auch mit einem Netz."}, {"theme": "6. Leistenhernie", "section": "AP", "type": "qa", "q": "Muss das Netz unbedingt sein?", "a": "Ich verstehe Ihre Sorge. Aber das Netz ist wichtig: Ohne es steht das Gewebe unter Spannung und reißt wieder. Das Netz ist aus einem sehr gut verträglichen Kunststoff, verwächst fest mit Ihrem Gewebe und verhindert zuverlässig, dass der Bruch wiederkommt."}, {"theme": "6. Leistenhernie", "section": "AP", "type": "qa", "q": "Welche Risiken hat die Operation?", "a": "Neben normalen Risiken wie Infektion oder Blutergüssen gibt es in der Leiste drei Besonderheiten: Nerven können gereizt werden (Taubheitsgefühl), beim Mann kann der Samenstrang verletzt werden (sehr selten Hodenschwund), und es kommt häufig zu harmlosen Blutergüssen, die von allein verschwinden."}, {"theme": "6. Leistenhernie", "section": "AP", "type": "qa", "q": "Wie muss ich mich nach der OP verhalten?", "a": "Die innere Heilung braucht Zeit: zwei bis drei Wochen körperlich schonen, nichts über 5 kg heben, kein Sport. Normales Gehen ist ab dem ersten Tag erlaubt und sogar gut."}, {"theme": "6. Leistenhernie", "section": "AA", "type": "qa", "q": "Was ist eine Hernie, und wie ist sie aufgebaut?", "a": "Eine Hernie ist der Austritt von Darmanteilen durch eine Schwachstelle der Bauchwand.\nBruchsack: Ausstülpung des Peritoneum parietale.\nBruchinhalt: meist Omentum majus oder Darmschlingen.\nBruchpforte: Lücke in der Bauchwand."}, {"theme": "6. Leistenhernie", "section": "AA", "type": "qa", "q": "Unterscheiden Sie die direkte und indirekte Leistenhernie.", "a": "Indirekt: lateral der epigastrischen Gefäße, durch den inneren Leistenring, oft angeboren, kann bis ins Skrotum reichen.\nDirekt: medial der epigastrischen Gefäße, direkt durch die Bauchwand im Hesselbach-Trigonum, immer erworben, meist ältere Männer."}, {"theme": "6. Leistenhernie", "section": "AA", "type": "qa", "q": "Wann wird eine Leistenhernie operiert?", "a": "Bei Frauen immer, wegen Verwechslungsgefahr mit Schenkelhernie und hohem Inkarzerationsrisiko.\nBei Männern bei Symptomen oder Wachstum, asymptomatisch ist Watchful Waiting möglich.\nBei jeder Inkarzeration ist es ein Notfall."}, {"theme": "6. Leistenhernie", "section": "AA", "type": "qa", "q": "Nennen Sie die Operationsverfahren bei Leistenhernie.", "a": "Shouldice: Naht ohne Netz, offen-anterior.\nLichtenstein: Netzimplantation, offen-anterior.\nTAPP/TEP: Netz, laparoskopisch, minimalinvasiv-posterior."}, {"theme": "6. Leistenhernie", "section": "AA", "type": "qa", "q": "Was ist eine Inkarzeration?", "a": "Akute Einklemmung von Bruchinhalt, meist Darm, in der Bruchpforte → Ischämie → Nekrose → akutes Abdomen. Symptome: plötzlich stärkste Schmerzen, harte irreponible Schwellung, Ileussymptomatik. Sofortige Notfall-OP."}, {"theme": "6. Leistenhernie", "section": "AA", "type": "qa", "q": "Unterscheiden Sie Prolene und Vicryl.", "a": "Prolene: nicht resorbierbarer Faden, bleibt dauerhaft für das Netz.\nVicryl: resorbierbar, für innere Gewebeschichten und Hautnaht."}, {"theme": "6. Leistenhernie", "section": "AA", "type": "qa", "q": "Was ist ein Kompartmentsyndrom?", "a": "Kritischer Druckanstieg in Muskellogen → Ischämie → Gewebeuntergang, chirurgischer Notfall: Fasziotomie."}, {"theme": "6. Leistenhernie", "section": "AA", "type": "qa", "q": "Wie sieht das postoperative Management nach Leistenhernien-OP aus?", "a": "Sandsack lokal zur Hämatomprophylaxe, Pflasterwechsel alle 2 Tage, Fadenzug nach 7–10 Tagen, Schonung 3–5 Tage, kein Heben über 5 kg für 2–3 Wochen."}, {"theme": "6. Leistenhernie", "section": "AA", "type": "tableau", "q": "Tableau clinique der Leistenhernie?", "a": "Tastbare, reponible Schwellung in der Leiste, verstärkt beim Pressen oder Husten, meist schmerzlos bei unkomplizierter Hernie.\nBei Inkarzeration: plötzlich stärkste Schmerzen, harte irreponible Schwellung, Ileussymptomatik → Notfall."}, {"theme": "6. Leistenhernie", "section": "AA", "type": "dd", "q": "Differentialdiagnosen der Leistenhernie (Fachbegriffe)?", "a": "Schenkelhernie.\nLymphknotenschwellung.\nLeistenabszess.\nLipome.\nVarikosis der V. saphena magna."}, {"theme": "7. Tonsillitis", "section": "AP", "type": "qa", "q": "Könnte man das nicht mit Medikamenten behandeln?", "a": "Bei Ihnen wurde die Behandlung schon mehrmals versucht, ohne dauerhaften Erfolg. Da das Risiko für Komplikationen hoch ist, rate ich Ihnen jetzt zur endgültigen Entfernung."}, {"theme": "7. Tonsillitis", "section": "AP", "type": "qa", "q": "Was ist eine Tonsillotomie?", "a": "Bei der Tonsillotomie werden die Mandeln nur verkleinert, bei der Tonsillektomie vollständig entfernt. Die Verkleinerung machen wir vor allem bei Kindern. Bei Erwachsenen ist die vollständige Entfernung der Standard."}, {"theme": "7. Tonsillitis", "section": "AP", "type": "qa", "q": "Besteht durch Bluttransfusionen ein Risiko für HIV oder Hepatitis?", "a": "Dank strengster Kontrollen und moderner Tests ist das Infektionsrisiko durch Blutübertragungen heute extrem gering."}, {"theme": "7. Tonsillitis", "section": "AP", "type": "qa", "q": "Wie kommt es zu Infektionen – benutzen Sie keine sterilen Instrumente?", "a": "Natürlich arbeiten wir mit sterilen Instrumenten. Infektionen entstehen meist durch körpereigene Bakterien aus dem Mund-Rachenraum, die über die Wunde ins Gewebe gelangen können."}, {"theme": "7. Tonsillitis", "section": "AP", "type": "qa", "q": "Kann ich ohne Mandeln leben?", "a": "Ja, absolut. Bei Erwachsenen haben die Mandeln ihre Immunfunktion bereits erfüllt. Andere Lymphknoten übernehmen diese Aufgabe."}, {"theme": "7. Tonsillitis", "section": "AP", "type": "qa", "q": "Warum darf ich nicht rauchen oder heiß duschen?", "a": "Rauchen verschlechtert die Wundheilung. Hitze durch Duschen oder Sonne erweitert die Gefäße und erhöht das Risiko für gefährliche Nachblutungen."}, {"theme": "7. Tonsillitis", "section": "AP", "type": "qa", "q": "Wann kann ich wieder arbeiten oder Sport treiben?", "a": "Sport erst nach 2 Wochen. Bei Berufen mit viel Sprechen, zum Beispiel im Callcenter, ebenfalls 2 Wochen Krankschreibung, um die Wunde nicht zu reizen."}, {"theme": "7. Tonsillitis", "section": "AP", "type": "qa", "q": "Was passiert, wenn ich die OP ablehne?", "a": "Die Entzündung kann sich verschlimmern und einen Abszess im Hals bilden. Außerdem können die Bakterien Herz oder Nieren dauerhaft schädigen."}, {"theme": "7. Tonsillitis", "section": "AP", "type": "qa", "q": "Worauf muss ich vor und nach der OP achten?", "a": "Vor der OP nüchtern bleiben. Nach der OP zwei Wochen weiche, kühle Kost, keine scharfen oder sauren Speisen, nicht heiß duschen oder baden."}, {"theme": "7. Tonsillitis", "section": "AA", "type": "qa", "q": "Nennen Sie den Waldeyer-Rachenring.", "a": "Tonsilla pharyngea (Rachenmandel).\nTonsilla palatina (Gaumenmandel) – meist gemeint bei „Tonsillitis“.\nTonsilla lingualis (Zungenmandel).\nTonsilla tubaria (Tubenmandel)."}, {"theme": "7. Tonsillitis", "section": "AA", "type": "qa", "q": "Unterscheiden Sie Tonsillektomie und Tonsillotomie.", "a": "Tonsillektomie: vollständige Entfernung inklusive Kapsel, Standard bei Erwachsenen.\nTonsillotomie: Teilentfernung, also Verkleinerung, Standard bei Kindern, geringeres Nachblutungsrisiko."}, {"theme": "7. Tonsillitis", "section": "AA", "type": "qa", "q": "Welche Ursachen der Tonsillitis kennen Sie?", "a": "Akut: meist viral, z. B. Adenoviren.\nChronisch-rezidivierend: meist bakteriell, beta-hämolysierende Streptokokken der Gruppe A."}, {"theme": "7. Tonsillitis", "section": "AA", "type": "qa", "q": "Nennen Sie die Sorensen-Kriterien zur OP-Indikation.", "a": "Unter 3 Episoden pro Jahr: keine OP-Indikation.\n3–5 Episoden: OP kann erwogen werden.\nAb 6 Episoden pro Jahr: klare OP-Indikation."}, {"theme": "7. Tonsillitis", "section": "AA", "type": "qa", "q": "Welche weiteren Indikationen zur Tonsillektomie gibt es?", "a": "Peritonsillarabszess, Malignomverdacht, obstruktives Schlafapnoesyndrom, Glomerulonephritis oder rheumatisches Fieber nach Streptokokkeninfektion."}, {"theme": "7. Tonsillitis", "section": "AA", "type": "qa", "q": "Was ist die häufigste Komplikation der Tonsillektomie?", "a": "Nachblutung – am OP-Tag oder zwischen Tag 5 und 8, wenn sich Fibrinbeläge lösen. Blutungsquelle meist die Arteria facialis."}, {"theme": "7. Tonsillitis", "section": "AA", "type": "qa", "q": "Welche systemischen Komplikationen der Streptokokkentonsillitis kennen Sie?", "a": "Rheumatisches Fieber: Herzklappenschäden, Arthritis, Chorea minor.\nPoststreptokokken-Glomerulonephritis: Nierenschädigung."}, {"theme": "7. Tonsillitis", "section": "AA", "type": "qa", "q": "Warum wird bei der Tonsillektomie eine Intubationsnarkose durchgeführt?", "a": "Um die Atemwege zu sichern und eine Aspiration von Blut oder Sekret in die Lunge zu verhindern."}, {"theme": "7. Tonsillitis", "section": "AA", "type": "qa", "q": "Wie lange bleibt der Patient nach Tonsillektomie stationär?", "a": "Etwa 3–5 Tage, wegen des hohen Nachblutungsrisikos an Tag 0 und Tag 5–8."}, {"theme": "7. Tonsillitis", "section": "AA", "type": "qa", "q": "Welche Nerven sind im Operationsgebiet gefährdet?", "a": "Nervus lingualis: Geschmack und Gefühl der Zunge.\nNervus hypoglossus: Zungenbewegung."}, {"theme": "7. Tonsillitis", "section": "AA", "type": "qa", "q": "Was ist das Von-Willebrand-Syndrom?", "a": "Die häufigste angeborene Blutgerinnungsstörung, durch Mangel oder Fehlfunktion des Von-Willebrand-Faktors. Typisch bei Frauen: starke Regelblutung, häufige blaue Flecken."}, {"theme": "7. Tonsillitis", "section": "AA", "type": "tableau", "q": "Tableau clinique der chronischen Tonsillitis?", "a": "Rezidivierende Tonsillitis → Leitsymptom, mind. 3–7×/Jahr.\nChronische Halsschmerzen.\nDysphagie.\nFötor ex ore.\nTonsillenhypertrophie.\nKryptenfüllung / Detritus.\nZervikale Lymphadenopathie.\nChronische Abgeschlagenheit.\nSubfebrile Temperaturen.\nSchnarchen / Schlafstörungen.\nImmer aktiv erfragen: Peritonsillarabszess (Notfall!), rheumatisches Fieber, Glomerulonephritis."}, {"theme": "7. Tonsillitis", "section": "AA", "type": "dd", "q": "Differentialdiagnosen der Tonsillitis (Fachbegriffe)?", "a": "Mononukleose (EBV) – wichtigste DD.\nPharyngitis.\nScharlach.\nHerpangina.\nPeritonsillarabszess.\nTonsillenlymphom.\nPlaut-Vincent-Angina.\nPFAPA-Syndrom."}, {"theme": "8. Lymphadenopathie", "section": "AP", "type": "qa", "q": "Gibt es Alternativmethoden zum Eingriff?", "a": "Man könnte mit einer feinen Nadel eine kleine Probe absaugen. Das ist aber nicht sicher genug. Nur wenn wir den ganzen Lymphknoten entnehmen, bekommen wir eine wirklich sichere Diagnose."}, {"theme": "8. Lymphadenopathie", "section": "AP", "type": "qa", "q": "Können wir das nicht mit Tabletten behandeln?", "a": "Im Moment wissen wir noch nicht, was die Ursache ist. Tabletten helfen nur, wenn wir den genauen Grund kennen. Wir müssen erst die Ursache finden."}, {"theme": "8. Lymphadenopathie", "section": "AP", "type": "qa", "q": "Kann es Krebs sein?", "a": "Ausschließen können wir es im Moment nicht. Aber eine Schwellung hat sehr oft harmlose Gründe – Erkältung, Entzündung. Genau um das zu klären, machen wir den kleinen Eingriff."}, {"theme": "8. Lymphadenopathie", "section": "AP", "type": "qa", "q": "Was können Sie tun, wenn es zu einer Nervenschädigung kommt?", "a": "In sehr seltenen Fällen kann man den Nerv in einer kleinen Operation wieder zusammennähen. Danach hilft vor allem gezielte Physiotherapie."}, {"theme": "8. Lymphadenopathie", "section": "AP", "type": "qa", "q": "Warum darf kein Wasser an die Wunde?", "a": "Damit keine Bakterien aus dem Leitungswasser in die Wunde gelangen. Die Wunde muss in den ersten Tagen trocken bleiben, um sich nicht zu entzünden."}, {"theme": "8. Lymphadenopathie", "section": "AA", "type": "qa", "q": "Wann ist eine Lymphknotenbiopsie indiziert?", "a": "Operative Exzision (Ganzentnahme) bei Größenprogredienz oder Dauer über 4 Wochen, harten, indolenten, nicht verschieblichen Lymphknoten, B-Symptomatik (Fieber, Nachtschweiß, Gewichtsverlust) oder generalisiertem Pruritus."}, {"theme": "8. Lymphadenopathie", "section": "AA", "type": "qa", "q": "Welche malignen Differentialdiagnosen der Lymphadenopathie kennen Sie?", "a": "Morbus Hodgkin, Non-Hodgkin-Lymphome.\nMetastasen von HNO-Tumoren (Nasopharynxkarzinom, Tonsillenkarzinom) oder Bronchialkarzinom.\nVirchow-Lymphknoten links supraklavikulär → Metastasen gastrointestinaler Tumoren, v. a. Magenkarzinom."}, {"theme": "8. Lymphadenopathie", "section": "AA", "type": "qa", "q": "Welche benignen Differentialdiagnosen der Lymphadenopathie kennen Sie?", "a": "Reaktive Lymphadenitis (EBV, HIV, Tuberkulose, Toxoplasmose, Streptokokken), Sklerosierung nach Infektion, medikamentös (Allopurinol, Phenytoin, Isoniazid)."}, {"theme": "8. Lymphadenopathie", "section": "AA", "type": "qa", "q": "Was sagen die Palpationskriterien der Lymphknoten aus?", "a": "Weich, druckdolent, verschieblich → akute Entzündung.\nIndolent, verschieblich → Autoimmunerkrankung, Speicherkrankheit.\nHart, indolent, nicht verschieblich, verbacken → Malignom oder chronische Infektion, z. B. Tuberkulose."}, {"theme": "8. Lymphadenopathie", "section": "AA", "type": "qa", "q": "Wie sieht die Diagnostik bei Lymphadenopathie aus?", "a": "Labor: Blutbild, CRP, LDH, HIV-Serologie, EBV-Serologie, Toxoplasma-Serologie, TSH, Leberenzyme, Rachenabstrich mit Streptokokken-Schnelltest, IGRA-Test.\nBildgebung: Sonographie Hals + Abdomen, Röntgen-Thorax, CT/MRT für Staging.\nInvasiv: Panendoskopie, Knochenmarksbiopsie.\nKeine Feinnadelpunktion – erlaubt keine Beurteilung der Lymphknotenarchitektur."}, {"theme": "8. Lymphadenopathie", "section": "AA", "type": "qa", "q": "Beschreiben Sie den Morbus Hodgkin.", "a": "Malignes B-Zell-Lymphom mit zwei Häufigkeitsgipfeln, 20–30 Jahre und hohes Alter. Ätiologie: EBV, HIV, Zytostatika, Strahlung. Klinik: derbe, indolente, nicht verschiebliche Lymphknoten, meist zervikal, B-Symptomatik, Hepatosplenomegalie, Pruritus. Goldstandard: Lymphknotenexstirpation, pathognomonisch sind Reed-Sternberg-Riesenzellen und Hodgkin-Zellen. Therapie: Radio-Chemotherapie nach Ann-Arbor-Stadium."}, {"theme": "8. Lymphadenopathie", "section": "AA", "type": "qa", "q": "Nennen Sie die Ann-Arbor-Klassifikation.", "a": "Stadium I: eine Lymphknotenregion.\nStadium II: mindestens zwei Regionen auf der gleichen Zwerchfellseite.\nStadium III: beidseits des Zwerchfells.\nStadium IV: diffuser extranodaler Befall, z. B. Knochenmark oder Leber.\nZusatz A: ohne B-Symptomatik. Zusatz B: mit B-Symptomatik."}, {"theme": "8. Lymphadenopathie", "section": "AA", "type": "qa", "q": "Beschreiben Sie das Pfeiffersche Drüsenfieber (EBV-Mononukleose).", "a": "Leitsymptom-Trias: fieberhafte Tonsillitis, generalisierte Lymphadenopathie, Splenomegalie. Amoxicillin und Ampicillin sind kontraindiziert wegen Exanthemgefahr. Sportverbot bei Splenomegalie für 3–4 Wochen wegen Milzrupturgefahr. Therapie rein symptomatisch."}, {"theme": "8. Lymphadenopathie", "section": "AA", "type": "qa", "q": "Beschreiben Sie die Toxoplasmose.", "a": "Infektion mit Toxoplasma gondii durch Katzenkot oder rohes Fleisch. Immunkompetent meist asymptomatisch, keine Therapie nötig. Schwangere unter der 16. SSW: Spiramycin. Ab der 16. SSW: Pyrimethamin + Sulfadiazin + Folinsäure."}, {"theme": "8. Lymphadenopathie", "section": "AA", "type": "qa", "q": "Nennen Sie das Standardtherapieschema der Tuberkulose.", "a": "HRZE-Schema für 2 Monate als Initialphase: Isoniazid (H), Rifampicin (R), Pyrazinamid (Z), Ethambutol (E). Danach 4 Monate Rifampicin + Isoniazid."}, {"theme": "8. Lymphadenopathie", "section": "AA", "type": "qa", "q": "Was ist das Pel-Ebstein-Fieber?", "a": "Zyklisch wellenförmiges Fieber bei malignen Lymphomen, fieberhafte Phasen wechseln sich mit fieberfreien Intervallen von je 3–10 Tagen ab."}, {"theme": "8. Lymphadenopathie", "section": "AA", "type": "qa", "q": "Nennen Sie die Leukämieklassifikation.", "a": "ALL, akut lymphatisch: häufigster Krebs im Kindesalter.\nAML, akut myeloisch: häufiger bei Erwachsenen.\nCLL, chronisch lymphatisch: indolentes Non-Hodgkin-Lymphom.\nCML, chronisch myeloisch: charakteristisch ist das Philadelphia-Chromosom."}, {"theme": "8. Lymphadenopathie", "section": "AA", "type": "qa", "q": "Was ist die histologische Besonderheit des Hodgkin-Lymphoms?", "a": "Pathognomonisch sind Reed-Sternberg-Riesenzellen, mehrkernig, und Hodgkin-Zellen, einkernig. Popcorn-Zellen (L&H-Zellen) sind atypische B-Zellen beim nodulären lymphozytenprädominanten Hodgkin-Lymphom (NLPHL)."}, {"theme": "8. Lymphadenopathie", "section": "AA", "type": "qa", "q": "Unterscheiden Sie SCLC und NSCLC beim Bronchialkarzinom.", "a": "SCLC, kleinzellig: extrem schnelles Wachstum, früh metastasiert, fast immer inoperabel, palliative Radio-Chemotherapie.\nNSCLC, nicht-kleinzellig: langsameres Wachstum, im Frühstadium operabel, Lobektomie + mediastinale Lymphadenektomie."}, {"theme": "8. Lymphadenopathie", "section": "AA", "type": "tableau", "q": "Tableau clinique der Lymphadenopathie unklarer Genese?", "a": "Lymphknotenschwellung an ein oder mehreren Stellen.\nSchmerzlose Lymphadenopathie → Alarmsignal, immer Malignom ausschließen.\nDruckdolente Lymphknoten → eher gutartig, reaktiv.\nDerbe, gummiartige Konsistenz → V.a. Lymphom.\nVerbackene Lymphknoten → V.a. Malignom.\nLokalisierte vs. generalisierte Lymphadenopathie.\nB-Symptomatik immer aktiv erfragen: Fieber, Nachtschweiß, Gewichtsverlust.\nB-Symptomatik + Lymphadenopathie → immer V.a. Lymphom."}, {"theme": "8. Lymphadenopathie", "section": "AA", "type": "dd", "q": "Differentialdiagnosen der Lymphadenopathie (Fachbegriffe)?", "a": "Reaktive Lymphadenitis.\nMononukleose (EBV).\nToxoplasmose.\nHIV-Infektion.\nTuberkulose.\nMorbus Hodgkin.\nNon-Hodgkin-Lymphom.\nLymphknotenmetastasen.\nSarkoidose.\nLupus erythematodes (SLE)."}, {"theme": "9. Akute Pankreatitis", "section": "AA", "type": "qa", "q": "Welche Ursachen der akuten Pankreatitis kennen Sie?", "a": "Biliär: Gallenstein verlegt die Papilla Vateri → Autodigestion.\nAlkohol.\nIdiopathisch.\nIatrogen, z. B. post-ERCP.\nMetabolisch: Hyperkalzämie, Hypertriglyzeridämie.\nWeitere: Trauma, Virusinfektion, z. B. Mumps."}, {"theme": "9. Akute Pankreatitis", "section": "AA", "type": "qa", "q": "Beschreiben Sie die Klinik der akuten Pankreatitis.", "a": "Plötzliche, heftige, gürtelförmige Oberbauchschmerzen mit Ausstrahlung in den Rücken. Übelkeit, Erbrechen, Meteorismus. „Gummibauch“: elastische Abwehrspannung ohne Loslassschmerz."}, {"theme": "9. Akute Pankreatitis", "section": "AA", "type": "qa", "q": "Wie sieht die Diagnostik der akuten Pankreatitis aus?", "a": "Labor: Lipase über dem 3-fachen Normalwert, der spezifischste Parameter; Amylase; Cholestaseparameter (GGT, AP, Bilirubin); CRP; Blutbild; Kalzium; Kreatinin.\nBildgebung: Abdomensonographie – Ödeme, Nekrosen, Gallensteine."}, {"theme": "9. Akute Pankreatitis", "section": "AA", "type": "qa", "q": "Wie behandeln Sie eine akute Pankreatitis?", "a": "Stationäre Aufnahme, ggf. Intensivstation.\nAggressive i.v. Flüssigkeitsgabe mit Ringer-Laktat.\nFrühzeitige enterale Ernährung, wenn schmerzfrei und ohne Erbrechen.\nAnalgesie mit Metamizol oder Pethidin/Buprenorphin – Morphin meiden wegen Sphinkter-Oddi-Spasmus.\nAntibiotika nur bei bakteriellen Komplikationen.\nERCP bei biliärer Pankreatitis mit Cholangitis oder persistierender Gallengangsobstruktion."}, {"theme": "9. Akute Pankreatitis", "section": "AA", "type": "qa", "q": "Welche Komplikationen der akuten Pankreatitis kennen Sie?", "a": "Hypovolämischer Schock durch Flüssigkeitsverlust in den dritten Raum.\nPankreasnekrosen, die sekundär infiziert werden können → Abszesse, Pseudozysten."}, {"theme": "9. Akute Pankreatitis", "section": "AA", "type": "tableau", "q": "Tableau clinique der akuten Pankreatitis?", "a": "Plötzliche, heftige, gürtelförmige Oberbauchschmerzen mit Ausstrahlung in den Rücken.\nÜbelkeit, Erbrechen, Meteorismus.\n„Gummibauch“: elastische Abwehrspannung ohne Loslassschmerz.\nBei schwerem Verlauf: hypovolämischer Schock, infizierte Nekrosen."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Wie behandeln Sie eine Peritonitis?", "a": "Sofortige i.v. Breitbandantibiose + chirurgische Herdsanierung (Naht + Lavage)."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Was bewirken Spasmolytika?", "a": "Sie bewirken eine Relaxation der glatten Muskulatur, wirken also krampflösend, z. B. Buscopan."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Was bedeutet die fraktionierte Gabe von Propofol?", "a": "Eine stufenweise, wirkungsorientierte Titration des Anästhetikums, keine Bolusgabe, um kardiovaskuläre Nebenwirkungen zu vermeiden."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Wie lange dauert ein histologisches Ergebnis in der Regel?", "a": "In der Regel 3–7 Werktage."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Wie teilen Sie einem Patienten eine maligne Diagnose mit?", "a": "Der Patient wird persönlich zu einem Befundgespräch einbestellt – unter vier Augen, einfühlsam."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Was prüfen Sie bei der digital-rektalen Untersuchung (DRU)?", "a": "Sphinktertonus, Prostata, Hämorrhoiden, Fissuren, frische Blutspuren, Douglas-Schmerz."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Warum darf man nach einer Koloskopie nicht sofort essen?", "a": "Um eine iatrogene Perforation sicher auszuschließen – im Falle einer Perforation muss der Patient für die Notfall-Laparotomie nüchtern sein."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Warum ist der postoperative Nikotinstopp wichtig?", "a": "Vasokonstriktion durch Nikotin und Kohlenmonoxid → Hypoxie → schwere Wundheilungsstörungen, erhöhtes Infektionsrisiko, erhöhtes kardiovaskuläres Risiko."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Wie sieht die Therapie der GERD aus?", "a": "Lebensstil: Gewichtsabnahme, Noxen meiden, kein Essen vor dem Schlafengehen.\nMedikamentös: PPI als Mittel der Wahl, H2-Blocker, Antazida.\nOperativ: Fundoplikatio nach Nissen bei therapierefraktärer GERD."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Welche refluxbegünstigenden Faktoren kennen Sie?", "a": "Alkohol, Nikotin, Adipositas, Fettessen, Anticholinergika, Betablocker, Calciumantagonisten, Nitrate, Theophyllin, Schwangerschaft, enge Gürtel."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Unterscheiden Sie die Savary-Miller- und die Los-Angeles-Klassifikation der Refluxösophagitis.", "a": "Beide klassifizieren die Refluxösophagitis nach Ausmaß der Schleimhautschäden, Savary-Miller in Stadien I–IV, Los-Angeles in Stadien A–D. Savary-Miller-Stadium IV entspricht dem Barrett-Ösophagus."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Wie sieht die kurative Therapie des Magenkarzinoms aus?", "a": "Gastrektomie mit Sicherheitsabstand, 5 cm beim intestinalen Typ, 8 cm beim diffusen Typ, + Lymphadenektomie + Resektion von Omentum majus und minus. Nachsorge: Jahr 1 alle 3 Monate, Jahr 2 alle 6 Monate, danach jährlich."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Was ist das Calot-Dreieck?", "a": "Ein anatomischer Raum bei der Gallenblasen-OP, begrenzt durch Ductus cysticus, Ductus hepaticus communis und die Leberunterfläche; hier verläuft die Arteria cystica."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Was ist das Sherren-Dreieck?", "a": "Ein gedachtes Dreieck auf der Bauchwand zwischen Bauchnabel, Symphyse und rechtem Beckenstachel, das zur Beurteilung der Appendizitis dient."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Was ist das Baldwin-Zeichen?", "a": "Schmerzen in der Flanke, die beim Beugen des rechten Beins auftreten."}];

const TYPE_LABELS = {
  qa: "Frage",
  tableau: "Tableau clinique",
  dd: "Differentialdiagnosen"
};
const TYPE_BADGE_CLASS = {
  qa: null, // depends on section
  tableau: "badge-tableau",
  dd: "badge-dd"
};

const themes = [...new Set(ALL_CARDS.map(c => c.theme))];

let currentTheme = themes[0];
let currentSection = "ALL"; // ALL | AP | AA
let deck = [];
let index = 0;
let flipped = false;

const themeSelect = document.getElementById('themeSelect');
const sectionSeg = document.getElementById('sectionSeg');
const cardEl = document.getElementById('card');
const frontQ = document.getElementById('frontQ');
const frontTag = document.getElementById('frontTag');
const backQ = document.getElementById('backQ');
const backTag = document.getElementById('backTag');
const backA = document.getElementById('backA');
const progressText = document.getElementById('progressText');
const deckInfo = document.getElementById('deckInfo');
const typeBadgeWrap = document.getElementById('typeBadgeWrap');
const cardArea = document.getElementById('cardArea');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

function populateThemeSelect() {
  themeSelect.innerHTML = '';
  themes.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = t;
    themeSelect.appendChild(opt);
  });
  themeSelect.value = currentTheme;
}

function availableSections() {
  const secs = new Set(ALL_CARDS.filter(c => c.theme === currentTheme).map(c => c.section));
  return secs;
}

function buildSectionSeg() {
  sectionSeg.innerHTML = '';
  const secs = availableSections();
  const options = [];
  options.push({key: "ALL", label: "Alle"});
  if (secs.has("AP")) options.push({key: "AP", label: "Patient-Arzt"});
  if (secs.has("AA")) options.push({key: "AA", label: "Arzt-Arzt"});
  if (!secs.has(currentSection) && currentSection !== "ALL") currentSection = "ALL";
  options.forEach(o => {
    const btn = document.createElement('button');
    btn.textContent = o.label;
    btn.dataset.key = o.key;
    if (o.key === currentSection) btn.classList.add('active');
    btn.addEventListener('click', () => {
      currentSection = o.key;
      buildSectionSeg();
      buildDeck();
    });
    sectionSeg.appendChild(btn);
  });
}

function buildDeck() {
  deck = ALL_CARDS.filter(c => c.theme === currentTheme && (currentSection === "ALL" || c.section === currentSection));
  index = 0;
  flipped = false;
  render();
}

function badgeHtml(card) {
  if (card.type === "tableau") return '<span class="type-badge badge-tableau">Tableau clinique</span>';
  if (card.type === "dd") return '<span class="type-badge badge-dd">DD</span>';
  if (card.section === "AA") return '<span class="type-badge badge-AA">Arzt-Arzt</span>';
  return '<span class="type-badge badge-AP">Patient-Arzt</span>';
}

function render() {
  cardEl.classList.remove('flipped');
  flipped = false;

  if (deck.length === 0) {
    cardArea.innerHTML = '<div class="empty-state">Keine Karten in dieser Auswahl.</div>';
    progressText.textContent = '0 / 0';
    deckInfo.textContent = '';
    typeBadgeWrap.innerHTML = '';
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    return;
  } else {
    // restore card area if it was replaced by empty state
    if (!document.getElementById('card')) {
      location.reload();
      return;
    }
  }

  const c = deck[index];
  frontTag.textContent = c.theme;
  frontQ.textContent = c.q;
  backTag.textContent = c.theme;
  backQ.textContent = c.q;
  backA.textContent = c.a;

  progressText.textContent = (index + 1) + ' / ' + deck.length;
  deckInfo.textContent = currentTheme;
  typeBadgeWrap.innerHTML = badgeHtml(c);

  prevBtn.disabled = index === 0;
  nextBtn.disabled = index === deck.length - 1;
}

function flip() {
  if (deck.length === 0) return;
  flipped = !flipped;
  cardEl.classList.toggle('flipped', flipped);
}

function next() {
  if (index < deck.length - 1) {
    index++;
    flipped = false;
    cardEl.classList.remove('flipped');
    render();
  }
}
function prev() {
  if (index > 0) {
    index--;
    flipped = false;
    cardEl.classList.remove('flipped');
    render();
  }
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  index = 0;
  render();
}

function resetDeck() {
  buildDeck();
}

function exportCSV() {
  let csv = 'theme,section,type,question,answer\n';
  deck.forEach(c => {
    const esc = s => '"' + String(s).replace(/"/g, '""').replace(/\n/g, ' | ') + '"';
    csv += [esc(c.theme), esc(c.section), esc(c.type), esc(c.q), esc(c.a)].join(',') + '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'fsp_lernkarten_' + currentTheme.replace(/[^a-zA-Z0-9]/g, '_') + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

themeSelect.addEventListener('change', () => {
  currentTheme = themeSelect.value;
  currentSection = "ALL";
  buildSectionSeg();
  buildDeck();
});

cardEl.addEventListener('click', flip);
prevBtn.addEventListener('click', prev);
nextBtn.addEventListener('click', next);
document.getElementById('shuffleBtn').addEventListener('click', shuffleDeck);
document.getElementById('resetBtn').addEventListener('click', resetDeck);
document.getElementById('csvBtn').addEventListener('click', exportCSV);

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flip(); }
  else if (e.code === 'ArrowRight') { next(); }
  else if (e.code === 'ArrowLeft') { prev(); }
});

populateThemeSelect();
buildSectionSeg();
buildDeck();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    });
  }
</script>
</body>
</html>
