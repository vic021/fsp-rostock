alkarzinom.", "a": "Das SCLC, kleinzellig, wächst extrem schnell, metastasiert früh und ist fast immer inoperabel, ich behandle palliativ mit Radio-Chemotherapie. Das NSCLC, nicht-kleinzellig, wächst langsamer und ist im Frühstadium operabel, ich mache eine Lobektomie mit mediastinaler Lymphadenektomie."}, {"theme": "8. Lymphadenopathie", "section": "AA", "type": "tableau", "q": "Wie sieht das klinische Bild der Lymphadenopathie unklarer Genese aus?", "a": "Eine Lymphknotenschwellung an einer oder mehreren Stellen. Eine schmerzlose Lymphadenopathie ist ein Alarmsignal, dabei muss ich immer ein Malignom ausschließen. Druckdolente Lymphknoten sind eher gutartig und reaktiv. Eine derbe, gummiartige Konsistenz spricht für ein Lymphom. Verbackene Lymphknoten sprechen für ein Malignom. Ich unterscheide lokalisierte von generalisierter Lymphadenopathie. Eine B-Symptomatik frage ich immer aktiv ab: Fieber, Nachtschweiß, Gewichtsverlust. B-Symptomatik zusammen mit Lymphadenopathie spricht immer für ein Lymphom."}, {"theme": "8. Lymphadenopathie", "section": "AA", "type": "dd", "q": "Welche Differentialdiagnosen der Lymphadenopathie kennen Sie?", "a": "Eine reaktive Lymphadenitis. Eine Mononukleose durch EBV. Eine Toxoplasmose. Eine HIV-Infektion. Eine Tuberkulose. Der Morbus Hodgkin. Ein Non-Hodgkin-Lymphom. Lymphknotenmetastasen. Eine Sarkoidose. Und der Lupus erythematodes, kurz SLE."}, {"theme": "9. Akute Pankreatitis", "section": "AA", "type": "qa", "q": "Welche Ursachen der akuten Pankreatitis kennen Sie?", "a": "Am häufigsten ist die biliäre Ursache: Ein Gallenstein verlegt die Papilla Vateri, dadurch kommt es zur Autodigestion der Bauchspeicheldrüse. Außerdem Alkohol, idiopathische Ursachen, iatrogen zum Beispiel nach einer ERCP, metabolisch durch eine Hyperkalzämie oder Hypertriglyzeridämie, sowie ein Trauma oder eine Virusinfektion wie Mumps."}, {"theme": "9. Akute Pankreatitis", "section": "AA", "type": "qa", "q": "Beschreiben Sie die Klinik der akuten Pankreatitis.", "a": "Plötzliche, heftige, gürtelförmige Oberbauchschmerzen mit Ausstrahlung in den Rücken. Dazu Übelkeit, Erbrechen und Meteorismus. Typisch ist der sogenannte Gummibauch, eine elastische Abwehrspannung ohne Loslassschmerz."}, {"theme": "9. Akute Pankreatitis", "section": "AA", "type": "qa", "q": "Wie sieht die Diagnostik der akuten Pankreatitis aus?", "a": "Im Labor bestimme ich die Lipase, sie ist der spezifischste Parameter, erhöht über das Dreifache des Normalwerts, dazu die Amylase, Cholestaseparameter wie GGT, AP und Bilirubin, CRP, Blutbild, Kalzium und Kreatinin. Bildgebend mache ich eine Abdomensonographie, um Ödeme, Nekrosen oder Gallensteine zu erkennen."}, {"theme": "9. Akute Pankreatitis", "section": "AA", "type": "qa", "q": "Wie behandeln Sie eine akute Pankreatitis?", "a": "Ich nehme den Patienten stationär auf, bei Bedarf auf die Intensivstation, und gebe aggressiv Flüssigkeit intravenös mit Ringer-Laktat. Sobald der Patient schmerzfrei ist und nicht erbricht, beginne ich früh mit enteraler Ernährung. Zur Analgesie gebe ich Metamizol oder Pethidin beziehungsweise Buprenorphin, Morphin meide ich wegen des Sphinkter-Oddi-Spasmus. Antibiotika gebe ich nur bei bakteriellen Komplikationen. Bei einer biliären Pankreatitis mit Cholangitis oder persistierender Gallengangsobstruktion mache ich eine ERCP."}, {"theme": "9. Akute Pankreatitis", "section": "AA", "type": "qa", "q": "Welche Komplikationen der akuten Pankreatitis kennen Sie?", "a": "Einen hypovolämischen Schock durch den Flüssigkeitsverlust in den dritten Raum, sowie Pankreasnekrosen, die sekundär infiziert werden können und dann zu Abszessen oder Pseudozysten führen."}, {"theme": "9. Akute Pankreatitis", "section": "AA", "type": "tableau", "q": "Wie sieht das klinische Bild der akuten Pankreatitis aus?", "a": "Plötzliche, heftige, gürtelförmige Oberbauchschmerzen mit Ausstrahlung in den Rücken. Übelkeit, Erbrechen, Meteorismus. Der Gummibauch: eine elastische Abwehrspannung ohne Loslassschmerz. Bei schwerem Verlauf ein hypovolämischer Schock oder infizierte Nekrosen."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Wie behandeln Sie eine Peritonitis?", "a": "Sofort mit einer intravenösen Breitbandantibiose, dazu eine chirurgische Herdsanierung mit Naht und Lavage."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Was bewirken Spasmolytika?", "a": "Sie bewirken eine Relaxation der glatten Muskulatur, wirken also krampflösend, zum Beispiel Buscopan."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Was bedeutet die fraktionierte Gabe von Propofol?", "a": "Das ist eine stufenweise, wirkungsorientierte Titration des Anästhetikums, keine Bolusgabe, um kardiovaskuläre Nebenwirkungen zu vermeiden."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Wie lange dauert ein histologisches Ergebnis in der Regel?", "a": "In der Regel 3 bis 7 Werktage."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Wie teilen Sie einem Patienten eine maligne Diagnose mit?", "a": "Der Patient wird persönlich zu einem Befundgespräch einbestellt, unter vier Augen und einfühlsam."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Was prüfen Sie bei der digital-rektalen Untersuchung, kurz DRU?", "a": "Den Sphinktertonus, die Prostata, Hämorrhoiden, Fissuren, frische Blutspuren und den Douglas-Schmerz."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Warum darf man nach einer Koloskopie nicht sofort essen?", "a": "Um eine iatrogene Perforation sicher auszuschließen. Falls doch eine Perforation vorliegt, muss der Patient für die Notfall-Laparotomie nüchtern sein."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Warum ist der postoperative Nikotinstopp wichtig?", "a": "Nikotin und Kohlenmonoxid führen zu einer Vasokonstriktion, dadurch zu einer Hypoxie im Gewebe, und das begünstigt schwere Wundheilungsstörungen, ein erhöhtes Infektionsrisiko und ein erhöhtes kardiovaskuläres Risiko."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Wie sieht die Therapie der GERD aus?", "a": "Beim Lebensstil rate ich zu Gewichtsabnahme, dem Meiden von Noxen und keinem Essen vor dem Schlafengehen. Medikamentös gebe ich einen PPI als Mittel der Wahl, alternativ H2-Blocker oder Antazida. Operativ mache ich bei therapierefraktärer GERD eine Fundoplikatio nach Nissen."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Welche refluxbegünstigenden Faktoren kennen Sie?", "a": "Alkohol, Nikotin, Adipositas, fettreiches Essen, Anticholinergika, Betablocker, Calciumantagonisten, Theophyllin, eine Schwangerschaft und enge Gürtel."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Unterscheiden Sie die Savary-Miller- und die Los-Angeles-Klassifikation der Refluxösophagitis.", "a": "Beide klassifizieren die Refluxösophagitis nach dem Ausmaß der Schleimhautschäden. Die Savary-Miller-Klassifikation unterteilt in Stadien I bis IV, die Los-Angeles-Klassifikation in Stadien A bis D. Das Savary-Miller-Stadium IV entspricht dabei dem Barrett-Ösophagus."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Wie sieht die kurative Therapie des Magenkarzinoms aus?", "a": "Ich mache eine Gastrektomie mit Sicherheitsabstand, 5 cm beim intestinalen Typ und 8 cm beim diffusen Typ, dazu eine Lymphadenektomie und die Resektion von Omentum majus und minus. In der Nachsorge sehe ich den Patienten im ersten Jahr alle 3 Monate, im zweiten Jahr alle 6 Monate, danach jährlich."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Was ist das Calot-Dreieck?", "a": "Das ist ein anatomischer Raum bei der Gallenblasen-OP, begrenzt durch den Ductus cysticus, den Ductus hepaticus communis und die Leberunterfläche. Darin verläuft die Arteria cystica."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Was ist das Sherren-Dreieck?", "a": "Das ist ein gedachtes Dreieck auf der Bauchwand zwischen Bauchnabel, Symphyse und rechtem Beckenstachel, das zur Beurteilung der Appendizitis dient."}, {"theme": "10. Allgemeine Begriffe & Klassifikationen", "section": "AA", "type": "qa", "q": "Was ist das Baldwin-Zeichen?", "a": "Das sind Schmerzen in der Flanke, die beim Beugen des rechten Beins auftreten."}];

const TYPE_LABELS = {
  qa: "Frage",
  tableau: "Tableau clinique",
  dd: "Differentialdiagnosen"
};
const TYPE_BADGE_CLASS = {
  qa: null, // depends on section
  tableau: "badge-tableau",
  dd: "badge-dd"
};

const themes = [...new Set(ALL_CARDS.map(c => c.theme))];

let currentTheme = themes[0];
let currentSection = "ALL"; // ALL | AP | AA
let deck = [];
let index = 0;
let flipped = false;

const themeSelect = document.getElementById('themeSelect');
const sectionSeg = document.getElementById('sectionSeg');
const cardEl = document.getElementById('card');
const frontQ = document.getElementById('frontQ');
const frontTag = document.getElementById('frontTag');
const backQ = document.getElementById('backQ');
const backTag = document.getElementById('backTag');
const backA = document.getElementById('backA');
const progressText = document.getElementById('progressText');
const deckInfo = document.getElementById('deckInfo');
const typeBadgeWrap = document.getElementById('typeBadgeWrap');
const cardArea = document.getElementById('cardArea');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

function populateThemeSelect() {
  themeSelect.innerHTML = '';
  themes.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = t;
    themeSelect.appendChild(opt);
  });
  themeSelect.value = currentTheme;
}

function availableSections() {
  const secs = new Set(ALL_CARDS.filter(c => c.theme === currentTheme).map(c => c.section));
  return secs;
}

function buildSectionSeg() {
  sectionSeg.innerHTML = '';
  const secs = availableSections();
  const options = [];
  options.push({key: "ALL", label: "Alle"});
  if (secs.has("AP")) options.push({key: "AP", label: "Patient-Arzt"});
  if (secs.has("AA")) options.push({key: "AA", label: "Arzt-Arzt"});
  if (!secs.has(currentSection) && currentSection !== "ALL") currentSection = "ALL";
  options.forEach(o => {
    const btn = document.createElement('button');
    btn.textContent = o.label;
    btn.dataset.key = o.key;
    if (o.key === currentSection) btn.classList.add('active');
    btn.addEventListener('click', () => {
      currentSection = o.key;
      buildSectionSeg();
      buildDeck();
    });
    sectionSeg.appendChild(btn);
  });
}

function buildDeck() {
  deck = ALL_CARDS.filter(c => c.theme === currentTheme && (currentSection === "ALL" || c.section === currentSection));
  index = 0;
  flipped = false;
  render();
}

function badgeHtml(card) {
  if (card.type === "tableau") return '<span class="type-badge badge-tableau">Tableau clinique</span>';
  if (card.type === "dd") return '<span class="type-badge badge-dd">DD</span>';
  if (card.section === "AA") return '<span class="type-badge badge-AA">Arzt-Arzt</span>';
  return '<span class="type-badge badge-AP">Patient-Arzt</span>';
}

function render() {
  cardEl.classList.remove('flipped');
  flipped = false;

  if (deck.length === 0) {
    cardArea.innerHTML = '<div class="empty-state">Keine Karten in dieser Auswahl.</div>';
    progressText.textContent = '0 / 0';
    deckInfo.textContent = '';
    typeBadgeWrap.innerHTML = '';
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    return;
  } else {
    // restore card area if it was replaced by empty state
    if (!document.getElementById('card')) {
      location.reload();
      return;
    }
  }

  const c = deck[index];
  frontTag.textContent = c.theme;
  frontQ.textContent = c.q;
  backTag.textContent = c.theme;
  backQ.textContent = c.q;
  backA.textContent = c.a;

  progressText.textContent = (index + 1) + ' / ' + deck.length;
  deckInfo.textContent = currentTheme;
  typeBadgeWrap.innerHTML = badgeHtml(c);

  prevBtn.disabled = index === 0;
  nextBtn.disabled = index === deck.length - 1;
}

function flip() {
  if (deck.length === 0) return;
  flipped = !flipped;
  cardEl.classList.toggle('flipped', flipped);
}

function next() {
  if (index < deck.length - 1) {
    index++;
    flipped = false;
    cardEl.classList.remove('flipped');
    render();
  }
}
function prev() {
  if (index > 0) {
    index--;
    flipped = false;
    cardEl.classList.remove('flipped');
    render();
  }
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  index = 0;
  render();
}

function resetDeck() {
  buildDeck();
}

function exportCSV() {
  let csv = 'theme,section,type,question,answer\n';
  deck.forEach(c => {
    const esc = s => '"' + String(s).replace(/"/g, '""').replace(/\n/g, ' | ') + '"';
    csv += [esc(c.theme), esc(c.section), esc(c.type), esc(c.q), esc(c.a)].join(',') + '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'fsp_lernkarten_' + currentTheme.replace(/[^a-zA-Z0-9]/g, '_') + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

themeSelect.addEventListener('change', () => {
  currentTheme = themeSelect.value;
  currentSection = "ALL";
  buildSectionSeg();
  buildDeck();
});

cardEl.addEventListener('click', flip);
prevBtn.addEventListener('click', prev);
nextBtn.addEventListener('click', next);
document.getElementById('shuffleBtn').addEventListener('click', shuffleDeck);
document.getElementById('resetBtn').addEventListener('click', resetDeck);
document.getElementById('csvBtn').addEventListener('click', exportCSV);

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flip(); }
  else if (e.code === 'ArrowRight') { next(); }
  else if (e.code === 'ArrowLeft') { prev(); }
});

populateThemeSelect();
buildSectionSeg();
buildDeck();
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    });
  }
</script>
</body>
